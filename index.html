function LangSwitcher({ lang, setLang }) {
  const [open, setOpen] = useState(false);
  const ref = useRef();
  useEffect(() => {
    const fn = e => { if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", fn);
    return () => document.removeEventListener("mousedown", fn);
  }, []);
  const cur = LANGS.find(l => l.code === lang) || LANGS[0];
  return (
    <div ref={ref} style={{position:"relative"}}>
      <button onClick={() => setOpen(o => !o)}
        style={{background:"rgba(255,255,255,0.12)",border:"none",borderRadius:8,
                padding:"6px 10px",cursor:"pointer",color:"#fff",display:"flex",
                alignItems:"center",gap:4,fontSize:"0.78rem",fontWeight:700}}>
        {cur.native}
        <ChevronDown size={10} style={{opacity:0.7,transform:open?"rotate(180deg)":"none",transition:"transform 0.15s"}}/>
      </button>
      {open && (
        <div style={{position:"absolute",top:"calc(100% + 6px)",right:0,zIndex:300,
                     background:"#fff",borderRadius:10,border:"1px solid #E2E8F0",
                     boxShadow:"0 8px 24px rgba(30,58,138,0.15)",minWidth:130,padding:"4px 0"}}>
          {LANGS.map(l => (
            <button key={l.code} onClick={() => { setLang(l.code); setOpen(false); }}
              style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"8px 14px",
                      border:"none",cursor:"pointer",background:lang===l.code?"#EEF2FF":"transparent",
                      fontSize:"0.82rem",fontWeight:lang===l.code?700:400,
                      color:lang===l.code?"#1E3A8A":"#0A1628",textAlign:"left"}}>
              <span style={{fontSize:"1rem",minWidth:20}}>{l.native}</span>
              <span>{l.label}</span>
              {lang===l.code && <Check size={12} style={{color:"#1E3A8A",marginLeft:"auto"}}/>}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

const BR = "#E2E8F0"; // border
const BG = "#F8FAFF"; // bg

function Toast({ toasts, remove }) {
  return (
    <div style={{position:"fixed",top:16,right:16,zIndex:9999,display:"flex",flexDirection:"column",gap:8,pointerEvents:"none"}}>
      {toasts.map(t => (
        <div key={t.id} style={{
          pointerEvents:"auto",display:"flex",alignItems:"center",gap:10,padding:"12px 16px",
          borderRadius:12,color:"#fff",fontSize:"0.82rem",fontWeight:500,minWidth:260,
          background:t.type==="success"?"#059669":t.type==="error"?"#dc2626":N,
          boxShadow:"0 8px 24px rgba(0,0,0,0.15)"
        }}>
          {t.type==="success"?<CheckCircle size={14}/>:t.type==="error"?<AlertCircle size={14}/>:<Bell size={14}/>}
          <span style={{flex:1}}>{t.message}</span>
          <button onClick={()=>remove(t.id)} style={{background:"none",border:"none",color:"#fff",cursor:"pointer",opacity:0.7,padding:0}}><X size={12}/></button>
        </div>
      ))}
    </div>
  );
}


function Logo({ size="md" }) {
  const h = size==="lg" ? 64 : 46;
  const w = Math.round(h * 3.4); // SVG aspect ratio 680:200
  return (
    <img src={LOGO_SRC} alt="Suraksha24"
      style={{height:h, width:w, display:"block", objectFit:"contain"}}/>
  );
}

function Header({ lang, setLang, tl, user, onSignOut }) {
  const [showMenu, setShowMenu] = useState(false);
  const menuRef = useRef();
  useEffect(()=>{
    const fn = e => { if(menuRef.current && !menuRef.current.contains(e.target)) setShowMenu(false); };
    document.addEventListener("mousedown", fn);
    return () => document.removeEventListener("mousedown", fn);
  },[]);

  return (
    <div style={{position:"fixed",top:0,left:0,right:0,zIndex:100,background:N,boxShadow:"0 2px 12px rgba(30,58,138,0.3)"}}>
      <div style={{display:"flex",alignItems:"center",gap:8,padding:"8px 14px"}}>
        <Logo/>
        <div style={{flex:1}}/>
        <LangSwitcher lang={lang} setLang={setLang}/>
        {user && (
          <div ref={menuRef} style={{position:"relative"}}>
            <button onClick={()=>setShowMenu(o=>!o)}
              style={{display:"flex",alignItems:"center",gap:7,background:"rgba(255,255,255,0.1)",
                      border:"1px solid rgba(212,175,55,0.3)",borderRadius:30,
                      padding:"4px 10px 4px 4px",cursor:"pointer"}}>
              {user.photoURL ? (
                <img src={user.photoURL} alt={user.displayName}
                  style={{width:26,height:26,borderRadius:"50%",objectFit:"cover",border:"1.5px solid #D4AF37"}}/>
              ) : (
                <div style={{width:26,height:26,borderRadius:"50%",background:"rgba(212,175,55,0.2)",
                              border:"1.5px solid #D4AF37",display:"flex",alignItems:"center",
                              justifyContent:"center",fontFamily:"'Syne',sans-serif",
                              fontWeight:800,fontSize:"0.75rem",color:"#D4AF37"}}>
                  {(user.displayName||user.email||"D").charAt(0).toUpperCase()}
                </div>
              )}
              <span style={{fontFamily:"'DM Sans',sans-serif",fontSize:"0.75rem",fontWeight:600,
                            color:"rgba(255,255,255,0.9)",maxWidth:72,overflow:"hidden",
                            textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
                {(user.displayName||user.email||"").split(" ")[0]}
              </span>
              <ChevronDown size={12} style={{color:"rgba(255,255,255,0.6)",
                transform:showMenu?"rotate(180deg)":"none",transition:"transform 0.15s"}}/>
            </button>

            {showMenu && (
              <div style={{position:"absolute",top:"calc(100% + 8px)",right:0,
                           background:"#fff",borderRadius:14,
                           boxShadow:"0 8px 32px rgba(0,0,0,0.2)",
                           border:"1px solid #E2E8F0",minWidth:200,zIndex:200,overflow:"hidden"}}>
                {/* User info */}
                <div style={{padding:"14px 16px",borderBottom:"1px solid #F1F5F9"}}>
                  <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"0.88rem",
                               color:"#0A1628"}}>{user.displayName}</div>
                  <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:"0.72rem",
                               color:"#64748b",marginTop:3}}>{user.email}</div>
                </div>
                {/* Sign Out */}
                <button onClick={()=>{setShowMenu(false);onSignOut();}}
                  style={{width:"100%",display:"flex",alignItems:"center",gap:10,
                          padding:"12px 16px",border:"none",cursor:"pointer",
                          background:"#fff",fontFamily:"'DM Sans',sans-serif",
                          fontSize:"0.82rem",fontWeight:600,color:"#dc2626",textAlign:"left"}}
                  onMouseEnter={e=>e.currentTarget.style.background="#fff5f5"}
                  onMouseLeave={e=>e.currentTarget.style.background="#fff"}>
                  <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#dc2626" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
                    <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/>

function StatusTabs({ active, onChange, counts, tl }) {
  const tabs=[
    {key:"all",          label:tl("all")},
    {key:"for sale",     label:"For Sale"},
    {key:"upcoming",     label:"Upcoming"},
    {key:"bulk deals",   label:"Bulk Deals"},
    {key:"total loss",   label:"Total Loss"},
    {key:"blacklisted",  label:"Blacklisted"},
    {key:"disputed",     label:"Disputed"},
  ];
  return (
    <div style={{display:"flex",background:"#fff",borderBottom:`1px solid ${BR}`,overflowX:"auto"}}>
      {tabs.map(t=>{
        const on=active===t.key;
        return (
          <button key={t.key} onClick={()=>onChange(t.key)}
            style={{flex:"0 0 auto",padding:"10px 16px",border:"none",cursor:"pointer",background:"transparent",
                    fontSize:"0.82rem",fontWeight:on?700:500,color:on?N:MT,
                    borderBottom:on?`2.5px solid ${N}`:"2.5px solid transparent",
                    display:"flex",alignItems:"center",gap:5,whiteSpace:"nowrap"}}>
            {t.label}
            {counts[t.key]!==undefined&&(
              <span style={{background:on?TI:"#f1f5f9",color:on?N:MT,fontSize:"0.68rem",fontWeight:700,padding:"1px 6px",borderRadius:10}}>
                {counts[t.key]}
              </span>
            )}
          </button>
        );
      })}
    </div>
  );
}

function FilterChips({ master, filters, setFilters, tl }) {
  const groups=[
    {key:"bank",        label:tl("bank"),         options:master.banks||[]},
    {key:"make",        label:tl("make"),         options:master.makes||[]},
    {key:"state",       label:tl("state"),        options:master.states||[]},
    {key:"parkingYard", label:tl("parkingYard"), options:master.parkingYards||[]},
    {key:"fuelType",    label:tl("fuel"),         options:master.fuelTypes||["Petrol","Diesel","CNG","Electric"]},
    {key:"rcStatus",    label:"RC Status",        options:master.rcStatuses||["Clear","Hypothecation","NOC Pending"]},
  ];
  const [open,setOpen]=useState(null);
  const ref=useRef();
  useEffect(()=>{
    const fn=(e)=>{if(ref.current&&!ref.current.contains(e.target))setOpen(null);};
    document.addEventListener("mousedown",fn);
    return()=>document.removeEventListener("mousedown",fn);
  },[]);
  const toggle=(key,val)=>setFilters(prev=>{const c=prev[key]||[];return{...prev,[key]:c.includes(val)?c.filter(x=>x!==val):[...c,val]};});
  const activeCount=Object.values(filters).flat().length;
  return (
    <div ref={ref} style={{background:"#fff",borderBottom:`1px solid ${BR}`,padding:"8px 14px",position:"relative"}}>
      <div style={{display:"flex",gap:7,overflowX:"auto",paddingBottom:2}}>
        {activeCount>0&&(
          <button onClick={()=>setFilters({})}
            style={{flexShrink:0,display:"flex",alignItems:"center",gap:4,padding:"5px 10px",borderRadius:20,
                    border:"1px solid #fca5a5",background:"#fee2e2",color:"#dc2626",fontSize:"0.75rem",fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>
            <X size={11}/> {tl("clear")} ({activeCount})
          </button>
        )}
        {groups.map(g=>{
          const active=(filters[g.key]||[]).length>0;
          const isOpen=open===g.key;
          return (
            <div key={g.key} style={{position:"relative",flexShrink:0}}>
              <button onClick={()=>setOpen(isOpen?null:g.key)}
                style={{display:"flex",alignItems:"center",gap:5,padding:"5px 12px",borderRadius:20,cursor:"pointer",whiteSpace:"nowrap",
                        fontSize:"0.78rem",fontWeight:active?700:500,
                        border:active?`1.5px solid ${N}`:`1px solid ${BR}`,
                        background:active?TI:"#f8fafc",color:active?N:MT}}>
                {g.label}
                {active&&<span style={{background:N,color:"#fff",fontSize:"0.62rem",fontWeight:700,padding:"1px 5px",borderRadius:8}}>{(filters[g.key]||[]).length}</span>}
                <ChevronDown size={11} style={{transition:"transform 0.15s",transform:isOpen?"rotate(180deg)":"none"}}/>
              </button>
              {isOpen&&(
                <div style={{position:"absolute",top:"calc(100% + 6px)",left:0,zIndex:200,background:"#fff",
                             border:`1px solid ${BR}`,borderRadius:12,boxShadow:"0 8px 24px rgba(30,58,138,0.12)",
                             minWidth:180,maxHeight:260,overflowY:"auto",padding:"6px 0"}}>
                  {g.options.map(opt=>{
                    const sel=(filters[g.key]||[]).includes(opt);
                    return (
                      <button key={opt} onClick={()=>toggle(g.key,opt)}
                        style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"8px 14px",border:"none",
                                cursor:"pointer",background:sel?TI:"transparent",fontSize:"0.82rem",color:sel?N:TX,fontWeight:sel?600:400,textAlign:"left"}}>
                        <div style={{width:16,height:16,borderRadius:4,flexShrink:0,border:`1.5px solid ${sel?N:BR}`,
                                     background:sel?N:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
                          {sel&&<Check size={10} style={{color:"#fff"}}/>}
                        </div>
                        {opt}
                      </button>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

function CarCard({ car, onContact, onBid, saved, toggleSave, tl }) {
  const [shared,setShared]=useState(false);
  const st=getStatus(car.status);
  const disabled=["total loss","blacklisted"].includes((car.status||"").toLowerCase());
  const share=async()=>{
    const text=`${car.regYear} ${car.make} ${car.model} (${car.regNo}) — ${formatCurrency(car.highestBid)} | Suraksha24`;
    try{await(navigator.share?navigator.share({title:"Suraksha24",text}):navigator.clipboard.writeText(text));}catch{}
    setShared(true);setTimeout(()=>setShared(false),2000);
  };

    <div style={{background:"#fff",borderRadius:14,overflow:"hidden",
                 border:car.featured?`1.5px solid ${N}`:`1px solid ${BR}`,
                 boxShadow:"0 2px 12px rgba(30,58,138,0.05)",transition:"all 0.2s",opacity:disabled?0.72:1}}
      onMouseEnter={e=>{if(!disabled){e.currentTarget.style.boxShadow="0 8px 24px rgba(30,58,138,0.13)";e.currentTarget.style.transform="translateY(-2px)";}}}
      onMouseLeave={e=>{e.currentTarget.style.boxShadow="0 2px 12px rgba(30,58,138,0.05)";e.currentTarget.style.transform="translateY(0)";}}>

      {(()=>{
        const s = (car.status||"").toLowerCase();

          {shared?<Check size={13}/>:<Share2 size={13}/>}

  );
}

function BidModal({ car, bundle, onClose, onSubmit, tl }) {
  const [form,setForm]=useState({dealerName:car._prefillName||"",mobile:"",bidPrice:"",remarks:"",agent:AGENT_NAMES[0]});
  const [loading,setLoading]=useState(false);
  const [errors,setErrors]=useState({});
  const validate=()=>{
    const e={};
    if(!form.dealerName.trim())e.dealerName=tl("required");
    if(!/^\d{10}$/.test(form.mobile))e.mobile=tl("validMobile");
    if(!form.bidPrice||isNaN(form.bidPrice)||Number(form.bidPrice)<=0)e.bidPrice=tl("validAmount");
    setErrors(e);return Object.keys(e).length===0;
  };
  const submit=async()=>{
    if(!validate())return;
    setLoading(true);

  const [errors, setErrors]       = useState({});
  const [step, setStep]           = useState(1); // 1=details, 2=kyc

  const set = (k,v) => setForm(p=>({...p,[k]:v}));

  const handleAadhaar = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    if(file.size > 10*1024*1024){ setErrors(p=>({...p,aadhaar:"Max 10MB allowed"})); return; }
    setAadhaarFile(file);
    setErrors(p=>({...p,aadhaar:""}));
  };
  const handlePan = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    if(file.size > 10*1024*1024){ setErrors(p=>({...p,pan:"Max 10MB allowed"})); return; }
    setPanFile(file);
    setErrors(p=>({...p,pan:""}));
  };

  const validateStep1 = () => {
    const e={};
    if(!form.dealershipName.trim()) e.dealershipName="Required";
    if(!/^\d{10}$/.test(form.mobile)) e.mobile="Valid 10-digit number";
    if(!form.address.trim()) e.address="Required";
    if(!form.pinCode||form.pinCode.length!==6) e.pinCode="Valid PIN required";
    if(!form.city.trim()) e.city="Required";
    if(!form.state.trim()) e.state="Required";
    if(form.interestType!=="PAN INDIA"&&!form.interestDetail.trim()) e.interestDetail="Please specify";
    setErrors(e); return Object.keys(e).length===0;
  };

  const toBase64 = (file) => new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>res(e.target.result.split(",")[1]);
    r.onerror=rej;
    r.readAsDataURL(file);
  });

  const submit = async () => {
    const e={};
    if(!aadhaarFile) e.aadhaar="Please upload your Aadhaar Card";
    if(!panFile) e.pan="Please upload your PAN Card";
    if(Object.keys(e).length){ setErrors(e); return; }
    setLoading(true);
    try {
      const [aadhaarB64, panB64] = await Promise.all([toBase64(aadhaarFile), toBase64(panFile)]);
      const interest = form.interestType==="PAN INDIA"
        ? "PAN INDIA"
        : `${form.interestType}: ${form.interestDetail}`;
      await fetch(CONFIG.APPS_SCRIPT_URL,{
        method:"POST", mode:"no-cors",
        body:JSON.stringify({
          action:"saveProfile", uid:user.uid,
          dealershipName:form.dealershipName, mobile:form.mobile,
          address:`${form.address}, ${form.city}, ${form.state} - ${form.pinCode}`,
          city:form.city, state:form.state, pinCode:form.pinCode,
          interest, message:form.message,
          kycBase64:aadhaarB64, kycFileName:aadhaarFile.name, kycMimeType:aadhaarFile.type,
          panBase64:panB64, panFileName:panFile.name, panMimeType:panFile.type,
        })
      });
      localStorage.setItem(`s24_profile_${user.uid}`,"complete");
      onComplete();
    } catch(e){ console.error("Profile error:",e); }
    finally { setLoading(false); }
  };

  const fetchPin = async (pin) => {
    set("pinCode", pin);
    if(pin.length !== 6 || !/^\d{6}$/.test(pin)) {
      if(pin.length === 6) setPinError("Enter valid 6-digit PIN");
      return;
    }
    setPinLoading(true); setPinError("");
    try {
      const res = await fetch(`https://api.postalpincode.in/pincode/${pin}`);
      const data = await res.json();
      if(data[0].Status === "Success" && data[0].PostOffice?.length) {
        const po = data[0].PostOffice[0];
        set("city", po.District || po.Block || "");
        set("state", po.State || "");
        setPinError("");
      } else {
        setPinError("PIN code not found");
      }
    } catch(e) {
      setPinError("Could not fetch. Check connection.");
    } finally {
      setPinLoading(false);
    }
  };

  const inp = (label,key,placeholder,type="text",err) => (
    <div style={{marginBottom:14}}>
      <label style={{display:"block",fontSize:"0.75rem",fontWeight:600,color:"#0A1628",
                     fontFamily:"'DM Sans',sans-serif",marginBottom:5}}>{label}</label>
      <input type={type} placeholder={placeholder} value={form[key]}
        onChange={e=>set(key,e.target.value)}
        style={{width:"100%",padding:"11px 14px",borderRadius:10,outline:"none",
                fontFamily:"'DM Sans',sans-serif",fontSize:"0.85rem",color:"#0A1628",
                border:`1.5px solid ${err?"#fca5a5":"#E2E8F0"}`,
                background:err?"#fff5f5":"#fff",boxSizing:"border-box"}}/>
      {err&&<div style={{fontSize:"0.7rem",color:"#dc2626",marginTop:4}}>{err}</div>}
    </div>
  );

  return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#060B27,#0A2463)",
                 display:"flex",alignItems:"center",justifyContent:"center",padding:"16px",
                 position:"relative",overflow:"hidden"}}>
      <div style={{position:"absolute",top:0,left:0,right:0,height:3,
                   background:"linear-gradient(90deg,transparent,#D4AF37,#F5C842,#D4AF37,transparent)"}}/>

      <div style={{width:"100%",maxWidth:480}}>
        {/* Header */}
        <div style={{textAlign:"center",marginBottom:20}}>
          <img src={window.__LOGO_SRC__} alt="Suraksha24"
            style={{height:44,width:"auto",display:"block",margin:"0 auto 14px"}}/>
          <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"1.1rem",
                       color:"#fff"}}>Complete Your Profile</div>
          <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:"0.78rem",
                       color:"rgba(255,255,255,0.5)",marginTop:4}}>
            One-time setup · Takes 2 minutes
          </div>
        </div>

        {/* Step indicators */}
        <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:20,justifyContent:"center"}}>
          {[1,2].map(s=>(
            <div key={s} style={{display:"flex",alignItems:"center",gap:8}}>
              <div style={{width:28,height:28,borderRadius:"50%",display:"flex",alignItems:"center",
                           justifyContent:"center",fontFamily:"'Syne',sans-serif",fontWeight:800,
                           fontSize:"0.8rem",
                           background:step>=s?"#D4AF37":"rgba(255,255,255,0.1)",
                           color:step>=s?"#0A1628":"rgba(255,255,255,0.4)"}}>
                {s}
              </div>
              {s<2&&<div style={{width:40,height:2,background:step>s?"#D4AF37":"rgba(255,255,255,0.15)"}}/>}
            </div>
          ))}
        </div>

        {/* Form card */}
        <div style={{background:"#fff",borderRadius:20,padding:"24px 20px",
                     boxShadow:"0 24px 64px rgba(0,0,0,0.4)"}}>

          {step===1 && (
            <>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"0.9rem",
                           color:"#0A1628",marginBottom:16}}>Dealership Details</div>
              {inp("Dealership / Company Name *","dealershipName","e.g. Sharma Auto Pvt Ltd","text",errors.dealershipName)}
              {inp("Mobile Number *","mobile","10-digit mobile number","tel",errors.mobile)}
              {inp("Street Address / Locality *","address","House No., Street, Area","text",errors.address)}

              {/* Pin Code with auto-fetch */}
              <div style={{marginBottom:14}}>
                <label style={{display:"block",fontSize:"0.75rem",fontWeight:600,color:"#0A1628",
                               fontFamily:"'DM Sans',sans-serif",marginBottom:5}}>PIN Code *</label>
                <div style={{position:"relative"}}>
                  <input type="tel" maxLength={6} placeholder="6-digit PIN code"
                    value={form.pinCode} onChange={e=>fetchPin(e.target.value)}
                    style={{width:"100%",padding:"11px 44px 11px 14px",borderRadius:10,outline:"none",
                            fontFamily:"'DM Sans',sans-serif",fontSize:"0.85rem",color:"#0A1628",
                            border:`1.5px solid ${pinError?"#fca5a5":form.city?"#22c55e":"#E2E8F0"}`,
                            background:pinError?"#fff5f5":form.city?"#f0fdf4":"#fff",
                            boxSizing:"border-box"}}/>
                  <div style={{position:"absolute",right:12,top:"50%",transform:"translateY(-50%)"}}>
                    {pinLoading
                      ? <div style={{width:16,height:16,border:"2px solid #BFDBFE",borderTopColor:"#1E3A8A",borderRadius:"50%",animation:"spin 0.7s linear infinite"}}/>
                      : form.city
                      ? <span style={{color:"#22c55e",fontSize:"1rem"}}>✓</span>
                      : null}
                  </div>
                </div>
                {pinError&&<div style={{fontSize:"0.7rem",color:"#dc2626",marginTop:4}}>{pinError}</div>}
                {form.city&&<div style={{fontSize:"0.7rem",color:"#059669",marginTop:4,fontWeight:600}}>
                  ✓ {form.city}, {form.state}
                </div>}
              </div>

              {/* City + State - auto filled, editable */}
              <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10,marginBottom:14}}>
                <div>
                  <label style={{display:"block",fontSize:"0.75rem",fontWeight:600,color:"#0A1628",
                                 fontFamily:"'DM Sans',sans-serif",marginBottom:5}}>City *</label>
                  <input type="text" placeholder="Auto-filled" value={form.city}
                    onChange={e=>set("city",e.target.value)}
                    style={{width:"100%",padding:"11px 14px",borderRadius:10,outline:"none",
                            fontFamily:"'DM Sans',sans-serif",fontSize:"0.85rem",color:"#0A1628",
                            border:`1.5px solid ${errors.city?"#fca5a5":"#E2E8F0"}`,
                            background:form.city?"#f0fdf4":"#fff",boxSizing:"border-box"}}/>
                  {errors.city&&<div style={{fontSize:"0.7rem",color:"#dc2626",marginTop:4}}>{errors.city}</div>}
                </div>
                <div>
                  <label style={{display:"block",fontSize:"0.75rem",fontWeight:600,color:"#0A1628",
                                 fontFamily:"'DM Sans',sans-serif",marginBottom:5}}>State *</label>
                  <input type="text" placeholder="Auto-filled" value={form.state}
                    onChange={e=>set("state",e.target.value)}
                    style={{width:"100%",padding:"11px 14px",borderRadius:10,outline:"none",
                            fontFamily:"'DM Sans',sans-serif",fontSize:"0.85rem",color:"#0A1628",
                            border:`1.5px solid ${errors.state?"#fca5a5":"#E2E8F0"}`,
                            background:form.state?"#f0fdf4":"#fff",boxSizing:"border-box"}}/>
                  {errors.state&&<div style={{fontSize:"0.7rem",color:"#dc2626",marginTop:4}}>{errors.state}</div>}
                </div>
              </div>

              {/* Interest */}
              <div style={{marginBottom:14}}>
                <label style={{display:"block",fontSize:"0.75rem",fontWeight:600,color:"#0A1628",
                               fontFamily:"'DM Sans',sans-serif",marginBottom:8}}>
                  Interested in dealing — Your Interest *
                </label>
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {["PAN INDIA","Specific State","Specific City"].map(opt=>(
                    <div key={opt}>
                      <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",
                                     padding:"10px 12px",borderRadius:9,
                                     border:`1.5px solid ${form.interestType===opt?"#1E3A8A":"#E2E8F0"}`,
                                     background:form.interestType===opt?"#EEF2FF":"#f8fafc"}}>
                        <input type="radio" name="interestType" value={opt}
                          checked={form.interestType===opt} onChange={()=>{set("interestType",opt);set("interestDetail","");}}
                          style={{accentColor:"#1E3A8A"}}/>
                        <span style={{fontFamily:"'DM Sans',sans-serif",fontSize:"0.82rem",
                                      color:"#0A1628",fontWeight:form.interestType===opt?600:400}}>
                          {opt==="PAN INDIA"?"🇮🇳 PAN INDIA — Any car, anywhere":
                           opt==="Specific State"?"📍 Specific State":
                           "🏙️ Specific City"}
                        </span>
                      </label>
                      {/* Detail input appears right below the selected option */}
                      {form.interestType===opt && opt!=="PAN INDIA" && (
                        <div style={{marginTop:6,paddingLeft:8}}>
                          <input type="text" autoFocus
                            placeholder={opt==="Specific State"?"e.g. Maharashtra, Delhi, Gujarat...":"e.g. Mumbai, Pune, Ahmedabad..."}
                            value={form.interestDetail} onChange={e=>set("interestDetail",e.target.value)}
                            style={{width:"100%",padding:"10px 14px",borderRadius:9,outline:"none",
                                    fontFamily:"'DM Sans',sans-serif",fontSize:"0.82rem",color:"#0A1628",
                                    border:`1.5px solid ${errors.interestDetail?"#fca5a5":"#BFDBFE"}`,
                                    background:"#EEF2FF",boxSizing:"border-box"}}/>
                          {errors.interestDetail&&(
                            <div style={{fontSize:"0.7rem",color:"#dc2626",marginTop:4,
                                         fontFamily:"'DM Sans',sans-serif"}}>{errors.interestDetail}</div>
                          )}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              </div>

              <button onClick={()=>{ if(validateStep1()) setStep(2); }}
                style={{width:"100%",padding:"13px",borderRadius:12,border:"none",cursor:"pointer",
                        background:"linear-gradient(135deg,#1E3A8A,#2563EB)",color:"#fff",
                        fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"0.9rem",
                        letterSpacing:"0.01em"}}>
                Next — Upload KYC →
              </button>
            </>
          )}

          {step===2 && (
            <>
              <button onClick={()=>setStep(1)}
                style={{display:"flex",alignItems:"center",gap:6,background:"none",border:"none",
                        cursor:"pointer",color:"#64748b",fontFamily:"'DM Sans',sans-serif",
                        fontSize:"0.78rem",marginBottom:14,padding:0}}>
                ← Back
              </button>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"0.9rem",
                           color:"#0A1628",marginBottom:6}}>Upload KYC Document</div>
              <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:"0.75rem",color:"#64748b",
                           marginBottom:16}}>
                Aadhaar / PAN / GST Certificate / Dealer License — mandatory to proceed
              </div>

              {/* File upload area */}
              {/* ── Aadhaar Upload ── */}
              <KycUploadBox
                label="Aadhaar Card *"
                file={aadhaarFile}
                error={errors.aadhaar}
                onCamera={handleAadhaar}
                onFile={handleAadhaar}
                onClear={()=>setAadhaarFile(null)}
              />

              {/* ── PAN Card Upload ── */}
              <KycUploadBox
                label="PAN Card *"
                file={panFile}
                error={errors.pan}
                onCamera={handlePan}
                onFile={handlePan}
                onClear={()=>setPanFile(null)}
              />

              {/* ── Optional Message (after KYC) ── */}
              <div style={{marginBottom:14}}>
                <label style={{display:"block",fontSize:"0.75rem",fontWeight:600,color:"#0A1628",
                               fontFamily:"'DM Sans',sans-serif",marginBottom:5}}>
                  Anything you'd like to tell us? (optional)
                </label>
                <textarea placeholder="Years of experience, preferred brands, payment terms..."
                  value={form.message} onChange={e=>set("message",e.target.value)} rows={2}
                  style={{width:"100%",padding:"11px 14px",borderRadius:10,outline:"none",resize:"vertical",
                          fontFamily:"'DM Sans',sans-serif",fontSize:"0.82rem",color:"#0A1628",
                          border:"1px solid #E2E8F0",background:"#fff",boxSizing:"border-box"}}/>
              </div>

              <div style={{marginTop:10,padding:"10px 12px",background:"#FFF7ED",borderRadius:8,
                           border:"1px solid #FDE68A",fontFamily:"'DM Sans',sans-serif",
                           fontSize:"0.72rem",color:"#92400e",lineHeight:1.6}}>
                🔒 Your KYC is stored securely and only accessible to Suraksha24 admin team.
              </div>

              <button onClick={submit} disabled={loading}
                style={{width:"100%",marginTop:20,padding:"13px",borderRadius:12,border:"none",
                        cursor:loading?"not-allowed":"pointer",opacity:loading?0.7:1,
                        background:"linear-gradient(135deg,#1E3A8A,#2563EB)",color:"#fff",
                        fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"0.9rem",
                        display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
                {loading?(
                  <><div style={{width:18,height:18,border:"2px solid rgba(255,255,255,0.3)",
                                  borderTopColor:"#fff",borderRadius:"50%",
                                  animation:"spin 0.7s linear infinite"}}/>
                  Uploading KYC & Saving...</>
                ):"Complete Registration 🚀"}
              </button>

              <div style={{textAlign:"center",marginTop:12,fontFamily:"'DM Sans',sans-serif",
                           fontSize:"0.7rem",color:"#94a3b8",lineHeight:1.6}}>
                KYC is mandatory for compliance.<br/>You cannot access inventory without it.
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

    <div style={{
      background:"linear-gradient(160deg,#060B27 0%,#0D1B4B 50%,#0A2463 100%)",
      padding:"20px 16px 18px",color:"#fff",position:"relative",overflow:"hidden"
    }}>
      {/* Gold shimmer accent line */}
      <div style={{position:"absolute",top:0,left:0,right:0,height:3,
                   background:"linear-gradient(90deg,transparent,#D4AF37,#F5C842,#D4AF37,transparent)"}}/>
      {/* Subtle radial glow */}
      <div style={{position:"absolute",top:-40,right:-40,width:180,height:180,
                   borderRadius:"50%",background:"rgba(212,175,55,0.08)",pointerEvents:"none"}}/>

      {/* Tagline badge */}
      <div style={{display:"inline-flex",alignItems:"center",gap:6,
                   background:"rgba(212,175,55,0.12)",
                   border:"1px solid rgba(212,175,55,0.35)",
                   borderRadius:30,padding:"4px 14px",marginBottom:14}}>
        <div style={{width:6,height:6,borderRadius:"50%",background:"#D4AF37",flexShrink:0}}/>
        <span style={{fontSize:"0.72rem",fontWeight:700,
                      color:"#D4AF37",letterSpacing:"0.12em",textTransform:"uppercase",
                      fontFamily:"'DM Sans',sans-serif"}}>{tl("tagline")}</span>
      </div>

      {/* Single line hero heading */}
      <div style={{marginBottom:16}}>
        <div style={{
          fontFamily:"'Syne',sans-serif",fontWeight:900,
          fontSize:"clamp(1.15rem,5.5vw,1.65rem)",
          lineHeight:1.1,letterSpacing:"-0.025em",
          color:"#FFFFFF",
          display:"flex",flexWrap:"wrap",alignItems:"baseline",gap:"0 8px"
        }}>
          <span>Premium Repo Inventory</span>
          <span style={{
            fontFamily:"'Cormorant Garamond',serif",
            fontStyle:"italic",fontWeight:600,
            fontSize:"clamp(1.1rem,5vw,1.55rem)",
            color:"#D4AF37",letterSpacing:"-0.01em"
          }}>Trusted by Dealers</span>
        </div>
      </div>

      {/* Search bar — half width, premium style */}
      <div style={{maxWidth:480}}>
        <div style={{
          background:"rgba(255,255,255,0.97)",
          borderRadius:14,display:"flex",alignItems:"center",
          gap:8,padding:"11px 14px",
          boxShadow:"0 4px 24px rgba(0,0,0,0.35),0 0 0 1px rgba(212,175,55,0.3)"
        }}>
          <Search size={16} style={{color:"#0D1B4B",flexShrink:0}}/>
          <input type="text" placeholder={tl("search")}
            value={searchTerm} onChange={e=>setSearchTerm(e.target.value)}
            style={{flex:1,border:"none",outline:"none",fontSize:"0.88rem",
                    background:"transparent",color:"#0A1628",
                    fontFamily:"'DM Sans',sans-serif",fontWeight:500}}/>
          {searchTerm&&(
            <button onClick={()=>setSearchTerm("")}
              style={{background:"none",border:"none",cursor:"pointer",padding:0,display:"flex"}}>
              <X size={14} style={{color:"#94a3b8"}}/>
            </button>
          )}
        </div>
      </div>
    </div>
  );
}

function BottomNav({ view, setView, savedCount, tl }) {
  const tabs=[{key:"home",icon:Home,label:tl("home")},{key:"saved",icon:Heart,label:tl("saved"),badge:savedCount},{key:"contact",icon:MessageSquare,label:tl("contactUs")}];
  return (
    <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:100,background:"#fff",borderTop:`1px solid ${BR}`,display:"flex",padding:"6px 0 8px",boxShadow:"0 -4px 20px rgba(30,58,138,0.08)"}}>
      {tabs.map(t=>{
        const on=view===t.key;
        const Icon=t.icon;
        return (
          <button key={t.key} onClick={()=>setView(t.key)}
            style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,border:"none",background:"none",cursor:"pointer",padding:"4px 0",position:"relative"}}>
            {t.badge>0&&(
              <span style={{position:"absolute",top:0,right:"calc(50% - 16px)",background:"#ef4444",color:"#fff",fontSize:"0.58rem",fontWeight:700,padding:"1px 4px",borderRadius:8}}>{t.badge}</span>
            )}
            <Icon size={20} style={{color:on?N:HI}}/>
            <span style={{fontSize:"0.65rem",fontWeight:on?700:500,color:on?N:HI}}>{t.label}</span>
          </button>
        );
      })}
    </div>
  );
}

function App() {
  const [cars,setCars]=useState([]);
  const [lang,setLang]=useState('en');
  const tl=(key)=>t(lang,key);
  const [user,setUser]=useState(null);
  const [authLoading,setAuthLoading]=useState(true);
  const [signInLoading,setSignInLoading]=useState(false);
  const [profileDone,setProfileDone]=useState(false);
  const [master,setMaster]=useState(SAMPLE_MASTER);
  const [loading,setLoading]=useState(true);
  const [searchTerm,setSearchTerm]=useState("");
  const [statusTab,setStatusTab]=useState("all");
  const [filters,setFilters]=useState({});
  const [saved,setSaved]=useState([]);
  const [view,setView]=useState("home");
  const [contactCar,setContactCar]=useState(null);
  const [bidCar,setBidCar]=useState(null);
  const [bidBundle,setBidBundle]=useState(null);
  const [toasts,setToasts]=useState([]);

  // Firebase Auth init
  useEffect(()=>{
    const auth = window.__fbAuth;
    if(!auth){ setAuthLoading(false); return; }
    const unsub = auth.onAuthStateChanged(async u=>{
      setUser(u);
      if(!u){ setAuthLoading(false); return; }

      // 1. Check localStorage first (fast)
      const localDone = localStorage.getItem(`s24_profile_${u.uid}`);
      if(localDone){
        setProfileDone(true);
        setAuthLoading(false);
      } else {
        // 2. Check Sheet — works across all devices/browsers
        try {
          const res  = await fetch(`${CONFIG.APPS_SCRIPT_URL}?action=getProfile&uid=${encodeURIComponent(u.uid)}`);
          const data = await res.json();
          if(data.profileComplete){
            localStorage.setItem(`s24_profile_${u.uid}`,"complete");
            setProfileDone(true);
          } else {
            setProfileDone(false);
          }
        } catch(e){
          setProfileDone(false);
        }
        setAuthLoading(false);
      }

      // 3. Record sign-in
      if(!CONFIG.APPS_SCRIPT_URL.includes("YOUR_")){
        fetch(CONFIG.APPS_SCRIPT_URL,{method:"POST",mode:"no-cors",
          body:JSON.stringify({action:"registerDealer",uid:u.uid,
            name:u.displayName,email:u.email,
            photo:u.photoURL,timestamp:new Date().toISOString()
          })
        }).catch(()=>{});
      }
    });
    return ()=>unsub();
  },[]);

  const handleGoogleSignIn = async () => {
    const auth = window.__fbAuth;
    if(!auth){ alert("Auth not ready — please refresh."); return; }
    setSignInLoading(true);
    try {
      const provider = new window.firebase.auth.GoogleAuthProvider();
      const result = await auth.signInWithPopup(provider);
      if(result?.user) setUser(result.user);
    } catch(e) {
      console.error("Sign in error:", e.code, e.message);
      if(e.code !== "auth/popup-closed-by-user"){
        alert("Sign-in failed: " + (e.code || e.message));
      }
      setSignInLoading(false);
    }
  };

  const handleSignOut = async () => {
    const auth = window.__fbAuth;
    if(!auth) return;
    await auth.signOut();
    setUser(null);
  };

  useEffect(()=>{
    if(!document.getElementById("s24-fonts")){
      const l=document.createElement("link");l.id="s24-fonts";l.rel="stylesheet";
      l.href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400;1,500;1,600;1,700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=DM+Mono:wght@400;500&family=Syne:wght@700;800;900&display=swap";
      document.head.appendChild(l);
    }
    document.body.style.cssText="margin:0;padding:0;background:#F8FAFF;font-family:'DM Sans',sans-serif;";
  },[]);



  useEffect(()=>{
    if(CONFIG.DEMO_MODE||!CONFIG.APPS_SCRIPT_URL||CONFIG.APPS_SCRIPT_URL.includes("YOUR_")){
      setCars(SAMPLE_CARS);setMaster(SAMPLE_MASTER);setLoading(false);return;
    }
    (async()=>{
      try{
        const res=await fetch(`${CONFIG.APPS_SCRIPT_URL}?action=getData`);
        const d=await res.json();
        if(d.cars?.length)setCars(d.cars);else setCars(SAMPLE_CARS);
        if(d.master)setMaster({...SAMPLE_MASTER,...d.master});
      }catch{setCars(SAMPLE_CARS);setMaster(SAMPLE_MASTER);}
      finally{setLoading(false);}
    })();
  },[]);

  const addToast=useCallback((message,type="info")=>{const id=Date.now();setToasts(t=>[...t,{id,message,type}]);setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),4000);},[]);
  const removeToast=useCallback((id)=>setToasts(t=>t.filter(x=>x.id!==id)),[]);
  const toggleSave=useCallback((id)=>setSaved(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]),[]);

  const filtered=useMemo(()=>{
    let out=cars;
    if(statusTab!=="all")out=out.filter(c=>(c.status||"").toLowerCase()===statusTab);
    if(searchTerm){const q=searchTerm.toLowerCase();out=out.filter(c=>[c.make,c.model,c.variant,c.regNo,c.state,c.bank,c.parkingYard,c.fuelType,c.rcStatus].some(v=>(v||"").toLowerCase().includes(q)));}
    Object.entries(filters).forEach(([k,vals])=>{if(vals.length)out=out.filter(c=>vals.includes(c[k]));});
    return out;
  },[cars,statusTab,searchTerm,filters]);

  const counts=useMemo(()=>({
    all:          cars.length,
    "for sale":   cars.filter(c=>c.status?.toLowerCase()==="for sale").length,
    "upcoming":   cars.filter(c=>c.status?.toLowerCase()==="upcoming").length,
    "bulk deals": cars.filter(c=>c.status?.toLowerCase()==="bulk deals").length,
    "disputed":   cars.filter(c=>c.status?.toLowerCase()==="disputed").length,
    "blacklisted":cars.filter(c=>c.status?.toLowerCase()==="blacklisted").length,
    "total loss":  cars.filter(c=>c.status?.toLowerCase()==="total loss").length,
  }),[cars]);

  const sorted=useMemo(()=>[...filtered].sort((a,b)=>(b.featured?1:0)-(a.featured?1:0)),[filtered]);

  const handleContact=useCallback(async(formData)=>{
    try{
      if(!CONFIG.DEMO_MODE&&!CONFIG.APPS_SCRIPT_URL.includes("YOUR_"))
        await fetch(CONFIG.APPS_SCRIPT_URL,{method:"POST",mode:"no-cors",body:JSON.stringify({action:"submitEnquiry",...formData})});
      setCars(prev=>prev.map(c=>c.id===formData.carId?{...c,enquiryTotal:(c.enquiryTotal||0)+1}:c));
      addToast("Enquiry submitted! Our agent will contact you shortly.","success");
    }catch{addToast("Submitted! We'll get back to you soon.","success");}
  },[addToast]);

  const handleBid=useCallback(async(formData)=>{
    try{
      if(!CONFIG.DEMO_MODE&&!CONFIG.APPS_SCRIPT_URL.includes("YOUR_"))
        await fetch(CONFIG.APPS_SCRIPT_URL,{method:"POST",mode:"no-cors",body:JSON.stringify({action:"submitDealerResponse",...formData,dealId:formData.dealId||""})});
      setCars(prev=>prev.map(c=>c.id===formData.carId?{...c,bidTotal:(c.bidTotal||0)+1}:c));
      addToast(`Bid of ₹${Number(formData.bidPrice).toLocaleString("en-IN")} submitted!`,"success");
    }catch{addToast("Bid submitted! Our team will review it.","success");}
  },[addToast]);

  // Bundle grouping for Bulk Deals tab
  const renderCards = () => {
    if (statusTab === "bulk deals") {
      const bundled = {};
      const standalone = [];
      sorted.forEach(c => {
        if (c.dealId) {
          if (!bundled[c.dealId]) bundled[c.dealId] = [];
          bundled[c.dealId].push(c);
        } else {
          standalone.push(c);
        }
      });
      return [
        ...Object.entries(bundled).map(([did, bCars]) => (
          <BundleCard key={did} dealId={did} cars={bCars}
            onBid={(c, d, bc) => { setBidCar(c); setBidBundle({dealId:d, cars:bc}); }}
            onContact={(c, d, bc) => { setContactCar(c); setBidBundle(null); }}/>
        )),
        ...standalone.map(c => (
          <CarCard key={c.id} car={c} onContact={setContactCar} onBid={setBidCar}
            saved={saved.includes(c.id)} toggleSave={toggleSave} tl={tl}/>
        )),
      ];
    }
    return sorted.map(c => (
      <CarCard key={c.id} car={c} onContact={setContactCar} onBid={setBidCar}
        saved={saved.includes(c.id)} toggleSave={toggleSave} tl={tl}/>
    ));
  };

    // Pre-fill dealer name from Google account
  const dealerDisplayName = user?.displayName || "";
  const dealerEmail = user?.email || "";

  if(authLoading) return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#060B27,#0A2463)",
                 display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{width:40,height:40,border:"3px solid rgba(212,175,55,0.3)",borderTopColor:"#D4AF37",
                   borderRadius:"50%",animation:"spin 0.7s linear infinite"}}/>
      <p style={{color:"rgba(255,255,255,0.5)",fontSize:"0.8rem",fontFamily:"'DM Sans',sans-serif"}}>Loading Suraksha24...</p>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );

  if(!user) return <AuthScreen onSignIn={handleGoogleSignIn} loading={signInLoading}/>;
  if(!profileDone) return <ProfileForm user={user} onComplete={()=>setProfileDone(true)}/>;

  return (
    <div style={{minHeight:"100vh",background:BG,paddingBottom:72}}>
      <Header lang={lang} setLang={setLang} tl={tl} user={user} onSignOut={handleSignOut}/>
      <div style={{paddingTop:62}}>
        {view==="home"&&(
          <>
            <HeroBanner tl={tl} searchTerm={searchTerm} setSearchTerm={setSearchTerm}/>
            <StatusTabs active={statusTab} onChange={setStatusTab} counts={counts} tl={tl}/>
            <FilterChips master={master} filters={filters} setFilters={setFilters} tl={tl}/>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px 6px"}}>
              <span style={{fontSize:"0.78rem",fontWeight:600,color:MT}}>
                {loading?tl("loading"):`${sorted.length} ${tl("carsFound")}`}
              </span>
              {Object.values(filters).flat().length>0&&(
                <button onClick={()=>setFilters({})} style={{fontSize:"0.72rem",color:N,fontWeight:600,background:"none",border:"none",cursor:"pointer"}}>{tl("clearFilters")}</button>
              )}
            </div>
            <div style={{padding:"0 14px",display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(420px,1fr))",gap:12}}>
              {loading?Array(4).fill(0).map((_,i)=>(
                <div key={i} style={{background:"#fff",borderRadius:14,height:130,border:`1px solid ${BR}`,animation:"pulse 1.5s ease-in-out infinite"}}/>
              )):sorted.length===0?(
                <div style={{textAlign:"center",padding:"48px 20px"}}>
                  <Car size={48} style={{color:BR,margin:"0 auto 12px"}}/>
                  <div style={{color:MT,fontSize:"0.9rem",fontWeight:600}}>{tl("noCarFound")}</div>
                  <div style={{color:HI,fontSize:"0.78rem",marginTop:6}}>{tl("adjustFilters")}</div>
                </div>
              ):renderCards()}

            </div>
          </>
        )}
        {view==="saved"&&<SavedCars cars={cars} savedIds={saved} onContact={setContactCar} onBid={setBidCar} toggleSave={toggleSave} tl={tl}/>}
        {view==="contact"&&<ContactPage tl={tl}/>}
      </div>

      <BottomNav view={view} setView={setView} savedCount={saved.length} tl={tl}/>

      {contactCar&&<ContactModal car={contactCar} onClose={()=>setContactCar(null)} onSubmit={handleContact} tl={tl}/>}
      {bidCar&&<BidModal car={{...bidCar,_prefillName:user?.displayName||""}} bundle={bidBundle} onClose={()=>{setBidCar(null);setBidBundle(null);}} onSubmit={handleBid} tl={tl}/>}

      <Toast toasts={toasts} remove={removeToast}/>

      <style>{`@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}@keyframes spin{to{transform:rotate(360deg)}}*{box-sizing:border-box}::-webkit-scrollbar{height:3px;width:4px}::-webkit-scrollbar-thumb{background:#BFDBFE;border-radius:4px}input::placeholder,textarea::placeholder{color:#94a3b8}`}</style>
    </div>
  );
}

document.getElementById('loader').style.display='none';
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
  <script>
    if("serviceWorker" in navigator){
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("/sw.js")
          .then(r => console.log("SW registered"))
          .catch(e => console.log("SW error:", e));
      });
    }
  </script>
</body>
</html>
