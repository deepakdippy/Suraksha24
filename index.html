function LangSwitcher({ lang, setLang }) {
  const [open, setOpen] = useState(false);
  const ref = useRef();
  useEffect(() => {
    const fn = e => { if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", fn);
    return () => document.removeEventListener("mousedown", fn);
  }, []);
  const cur = LANGS.find(l => l.code === lang) || LANGS[0];
  return (
    <div ref={ref} style={{position:"relative"}}>
      <button onClick={() => setOpen(o => !o)}
        style={{background:"rgba(255,255,255,0.12)",border:"none",borderRadius:8,
                padding:"6px 10px",cursor:"pointer",color:"#fff",display:"flex",
                alignItems:"center",gap:4,fontSize:"0.78rem",fontWeight:700}}>
        {cur.native}
        <ChevronDown size={10} style={{opacity:0.7,transform:open?"rotate(180deg)":"none",transition:"transform 0.15s"}}/>
      </button>
      {open && (
        <div style={{position:"absolute",top:"calc(100% + 6px)",right:0,zIndex:300,
                     background:"#fff",borderRadius:10,border:"1px solid #E2E8F0",
                     boxShadow:"0 8px 24px rgba(30,58,138,0.15)",minWidth:130,padding:"4px 0"}}>
          {LANGS.map(l => (
            <button key={l.code} onClick={() => { setLang(l.code); setOpen(false); }}
              style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"8px 14px",
                      border:"none",cursor:"pointer",background:lang===l.code?"#EEF2FF":"transparent",
                      fontSize:"0.82rem",fontWeight:lang===l.code?700:400,
                      color:lang===l.code?"#1E3A8A":"#0A1628",textAlign:"left"}}>
              <span style={{fontSize:"1rem",minWidth:20}}>{l.native}</span>
              <span>{l.label}</span>
              {lang===l.code && <Check size={12} style={{color:"#1E3A8A",marginLeft:"auto"}}/>}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

    <div style={{position:"fixed",top:16,right:16,zIndex:9999,display:"flex",flexDirection:"column",gap:8,pointerEvents:"none"}}>
      {toasts.map(t => (
        <div key={t.id} style={{
          pointerEvents:"auto",display:"flex",alignItems:"center",gap:10,padding:"12px 16px",
          borderRadius:12,color:"#fff",fontSize:"0.82rem",fontWeight:500,minWidth:260,
          background:t.type==="success"?"#059669":t.type==="error"?"#dc2626":N,
          boxShadow:"0 8px 24px rgba(0,0,0,0.15)"
        }}>
          {t.type==="success"?<CheckCircle size={14}/>:t.type==="error"?<AlertCircle size={14}/>:<Bell size={14}/>}
          <span style={{flex:1}}>{t.message}</span>
          <button onClick={()=>remove(t.id)} style={{background:"none",border:"none",color:"#fff",cursor:"pointer",opacity:0.7,padding:0}}><X size={12}/></button>
        </div>
      ))}
    </div>
  );
}

function StatusTabs({ active, onChange, counts, tl }) {
  const tabs=[{key:"all",label:tl("all")},{key:"available",label:tl("available")},{key:"pending",label:tl("pending")},{key:"sold",label:tl("sold")}];
  return (
    <div style={{display:"flex",background:"#fff",borderBottom:`1px solid ${BR}`,overflowX:"auto"}}>
      {tabs.map(t=>{
        const on=active===t.key;
        return (
          <button key={t.key} onClick={()=>onChange(t.key)}
            style={{flex:"0 0 auto",padding:"10px 16px",border:"none",cursor:"pointer",background:"transparent",
                    fontSize:"0.82rem",fontWeight:on?700:500,color:on?N:MT,
                    borderBottom:on?`2.5px solid ${N}`:"2.5px solid transparent",
                    display:"flex",alignItems:"center",gap:5,whiteSpace:"nowrap"}}>
            {t.label}
            {counts[t.key]!==undefined&&(
              <span style={{background:on?TI:"#f1f5f9",color:on?N:MT,fontSize:"0.68rem",fontWeight:700,padding:"1px 6px",borderRadius:10}}>
                {counts[t.key]}
              </span>
            )}
          </button>
        );
      })}
    </div>
  );
}

function FilterChips({ master, filters, setFilters, tl }) {
  const groups=[
    {key:"bank",        label:tl("bank"),         options:master.banks||[]},
    {key:"make",        label:tl("make"),         options:master.makes||[]},
    {key:"state",       label:tl("state"),        options:master.states||[]},
    {key:"parkingYard", label:tl("parkingYard"), options:master.parkingYards||[]},
    {key:"fuelType",    label:tl("fuel"),         options:master.fuelTypes||["Petrol","Diesel","CNG","Electric"]},
  ];
  const [open,setOpen]=useState(null);
  const ref=useRef();
  useEffect(()=>{
    const fn=(e)=>{if(ref.current&&!ref.current.contains(e.target))setOpen(null);};
    document.addEventListener("mousedown",fn);
    return()=>document.removeEventListener("mousedown",fn);
  },[]);
  const toggle=(key,val)=>setFilters(prev=>{const c=prev[key]||[];return{...prev,[key]:c.includes(val)?c.filter(x=>x!==val):[...c,val]};});
  const activeCount=Object.values(filters).flat().length;
  return (
    <div ref={ref} style={{background:"#fff",borderBottom:`1px solid ${BR}`,padding:"8px 14px",position:"relative"}}>
      <div style={{display:"flex",gap:7,overflowX:"auto",paddingBottom:2}}>
        {activeCount>0&&(
          <button onClick={()=>setFilters({})}
            style={{flexShrink:0,display:"flex",alignItems:"center",gap:4,padding:"5px 10px",borderRadius:20,
                    border:"1px solid #fca5a5",background:"#fee2e2",color:"#dc2626",fontSize:"0.75rem",fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>
            <X size={11}/> {tl("clear")} ({activeCount})
          </button>
        )}
        {groups.map(g=>{
          const active=(filters[g.key]||[]).length>0;
          const isOpen=open===g.key;
          return (
            <div key={g.key} style={{position:"relative",flexShrink:0}}>
              <button onClick={()=>setOpen(isOpen?null:g.key)}
                style={{display:"flex",alignItems:"center",gap:5,padding:"5px 12px",borderRadius:20,cursor:"pointer",whiteSpace:"nowrap",
                        fontSize:"0.78rem",fontWeight:active?700:500,
                        border:active?`1.5px solid ${N}`:`1px solid ${BR}`,
                        background:active?TI:"#f8fafc",color:active?N:MT}}>
                {g.label}
                {active&&<span style={{background:N,color:"#fff",fontSize:"0.62rem",fontWeight:700,padding:"1px 5px",borderRadius:8}}>{(filters[g.key]||[]).length}</span>}
                <ChevronDown size={11} style={{transition:"transform 0.15s",transform:isOpen?"rotate(180deg)":"none"}}/>
              </button>
              {isOpen&&(
                <div style={{position:"absolute",top:"calc(100% + 6px)",left:0,zIndex:200,background:"#fff",
                             border:`1px solid ${BR}`,borderRadius:12,boxShadow:"0 8px 24px rgba(30,58,138,0.12)",
                             minWidth:180,maxHeight:260,overflowY:"auto",padding:"6px 0"}}>
                  {g.options.map(opt=>{
                    const sel=(filters[g.key]||[]).includes(opt);
                    return (
                      <button key={opt} onClick={()=>toggle(g.key,opt)}
                        style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"8px 14px",border:"none",
                                cursor:"pointer",background:sel?TI:"transparent",fontSize:"0.82rem",color:sel?N:TX,fontWeight:sel?600:400,textAlign:"left"}}>
                        <div style={{width:16,height:16,borderRadius:4,flexShrink:0,border:`1.5px solid ${sel?N:BR}`,
                                     background:sel?N:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
                          {sel&&<Check size={10} style={{color:"#fff"}}/>}
                        </div>
                        {opt}
                      </button>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

  const share=async()=>{
    const text=`${car.regYear} ${car.make} ${car.model} (${car.regNo}) — ${formatCurrency(car.highestBid)} | Suraksha24`;
    try{await(navigator.share?navigator.share({title:"Suraksha24",text}):navigator.clipboard.writeText(text));}catch{}
    setShared(true);setTimeout(()=>setShared(false),2000);
  };
  return (
    <div style={{background:"#fff",borderRadius:14,overflow:"hidden",
                 border:car.featured?`1.5px solid ${N}`:`1px solid ${BR}`,
                 boxShadow:"0 2px 12px rgba(30,58,138,0.05)",transition:"all 0.2s",opacity:sold?0.75:1}}
      onMouseEnter={e=>{if(!sold){e.currentTarget.style.boxShadow="0 8px 24px rgba(30,58,138,0.13)";e.currentTarget.style.transform="translateY(-2px)";}}}
      onMouseLeave={e=>{e.currentTarget.style.boxShadow="0 2px 12px rgba(30,58,138,0.05)";e.currentTarget.style.transform="translateY(0)";}}>

      {(car.featured||car.status?.toLowerCase()==="pending")&&(
        <div style={{background:car.featured?N:"#d97706",padding:"3px 12px",display:"flex",alignItems:"center",justifyContent:"space-between"}}>
          <span style={{fontSize:"0.65rem",fontWeight:700,color:"#fff",letterSpacing:"0.08em"}}>
            {car.featured?"★ FEATURED":"⏳ PENDING"}
          </span>
          <span style={{fontSize:"0.65rem",color:"rgba(255,255,255,0.7)"}}>{car.bank}</span>
        </div>
      )}

      <div style={{display:"flex"}}>
        <div style={{width:100,flexShrink:0,background:`linear-gradient(135deg,${TI},#DBEAFE)`,
                     display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
                     padding:"10px 6px",position:"relative"}}>
          <Car size={36} style={{color:N,opacity:0.65}}/>
          <div style={{marginTop:5,textAlign:"center"}}>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:900,fontSize:"0.75rem",color:TX,lineHeight:1}}>{car.make}</div>
            <div style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontWeight:600,fontSize:"0.85rem",color:N,lineHeight:1.1}}>{car.model}</div>
          </div>
          <div style={{position:"absolute",top:5,left:5,display:"flex",alignItems:"center",gap:3,
                       padding:"2px 5px",borderRadius:20,background:st.bg,border:`1px solid ${st.border}`}}>
            <span style={{width:4,height:4,borderRadius:"50%",background:st.dot,flexShrink:0}}/>
            <span style={{fontSize:"0.55rem",fontWeight:700,color:st.color}}>{car.status}</span>

        <div style={{flex:1,padding:"10px 12px",minWidth:0}}>
          <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:5}}>
            <div>
              <div style={{fontWeight:700,fontSize:"0.88rem",color:TX,lineHeight:1.2}}>
                {car.make} {car.model} <span style={{fontWeight:400,color:MT}}>{car.regYear}</span>
              </div>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:"0.7rem",color:N,fontWeight:500,marginTop:2,letterSpacing:"0.04em"}}>{car.regNo}</div>
            </div>
            <button onClick={()=>toggleSave(car.id)}
              style={{background:"none",border:"none",cursor:"pointer",padding:4,flexShrink:0,color:saved?"#ef4444":HI}}>
              <Heart size={15} fill={saved?"#ef4444":"none"}/>

          <div style={{display:"flex",flexWrap:"wrap",gap:"3px 10px",marginBottom:6}}>

              <span key={val} style={{display:"inline-flex",alignItems:"center",gap:3,fontSize:"0.68rem",color:MT}}>

            <div>
              <div style={{fontSize:"0.58rem",fontWeight:500,color:HI,textTransform:"uppercase",letterSpacing:"0.06em"}}>{tl("basePrice")}</div>
              <div style={{fontWeight:800,fontSize:"1.05rem",color:TX,lineHeight:1,letterSpacing:"-0.02em"}}>{formatCurrency(car.highestBid)}</div>

        </div>
        <button onClick={share} style={{background:"none",border:"none",cursor:"pointer",color:shared?"#10b981":HI,padding:2}}>
          {shared?<Check size={13}/>:<Share2 size={13}/>}
        </button>
      </div>
    </div>
  );
}

function BidModal({ car, onClose, onSubmit, tl }) {
  const [form,setForm]=useState({dealerName:"",mobile:"",bidPrice:"",remarks:"",agent:AGENT_NAMES[0]});
  const [loading,setLoading]=useState(false);
  const [errors,setErrors]=useState({});
  const validate=()=>{
    const e={};
    if(!form.dealerName.trim())e.dealerName=tl("required");
    if(!/^\d{10}$/.test(form.mobile))e.mobile=tl("validMobile");
    if(!form.bidPrice||isNaN(form.bidPrice)||Number(form.bidPrice)<=0)e.bidPrice=tl("validAmount");
    setErrors(e);return Object.keys(e).length===0;
  };
  const submit=async()=>{
    if(!validate())return;
    setLoading(true);
    await onSubmit({...form,carId:car.id,regNo:car.regNo,carName:`${car.make} ${car.model}`});
    setLoading(false);onClose();
  };
  const inp=(label,key,ph,type="text")=>(
    <div style={{marginBottom:12}}>
      <label style={{display:"block",fontSize:"0.75rem",fontWeight:600,color:TX,marginBottom:4}}>{label}</label>
      <input type={type} placeholder={ph} value={form[key]} onChange={e=>setForm(p=>({...p,[key]:e.target.value}))}
        style={{width:"100%",padding:"10px 12px",borderRadius:9,outline:"none",fontSize:"0.85rem",color:TX,
                border:`1.5px solid ${errors[key]?"#fca5a5":BR}`,background:errors[key]?"#fff5f5":"#fff",boxSizing:"border-box"}}/>
      {errors[key]&&<div style={{fontSize:"0.7rem",color:"#dc2626",marginTop:3}}>{errors[key]}</div>}
    </div>
  );
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:500,display:"flex",alignItems:"flex-end",justifyContent:"center"}}
         onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div style={{background:"#fff",borderRadius:"20px 20px 0 0",width:"100%",maxWidth:520,padding:"20px 20px 32px",maxHeight:"90vh",overflowY:"auto"}}>
        <div style={{width:40,height:4,background:BR,borderRadius:4,margin:"0 auto 16px"}}/>
        <div style={{background:TI,border:`1px solid ${BO}`,borderRadius:10,padding:"10px 14px",marginBottom:16,display:"flex",alignItems:"center",gap:10}}>
          <Car size={26} style={{color:N,flexShrink:0}}/>
          <div>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:900,fontSize:"0.9rem",color:TX}}>{car.make} {car.model} {car.regYear}</div>
            <div style={{fontFamily:"'DM Mono',monospace",fontSize:"0.7rem",color:N,marginTop:2}}>{car.regNo} · Base: {formatCurrency(car.highestBid)}</div>
          </div>
        </div>
        <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"0.95rem",color:TX,marginBottom:14}}>{tl("submitBid")}</div>
        {inp("Dealer / Company Name *","dealerName","e.g. Sharma Auto Pvt Ltd")}
        {inp("Mobile Number *","mobile","10-digit mobile","tel")}
        <div style={{marginBottom:12}}>
          <label style={{display:"block",fontSize:"0.75rem",fontWeight:600,color:TX,marginBottom:4}}>{tl("bidPrice")}</label>
          <div style={{position:"relative"}}>
            <span style={{position:"absolute",left:12,top:"50%",transform:"translateY(-50%)",fontWeight:700,color:N,fontSize:"1rem"}}>₹</span>
            <input type="number" placeholder={`Min. ${(car.highestBid||0).toLocaleString("en-IN")}`}
              value={form.bidPrice} onChange={e=>setForm(p=>({...p,bidPrice:e.target.value}))}
              style={{width:"100%",padding:"10px 12px 10px 28px",borderRadius:9,outline:"none",fontSize:"0.88rem",fontWeight:700,color:TX,
                      border:`1.5px solid ${errors.bidPrice?"#fca5a5":BR}`,background:errors.bidPrice?"#fff5f5":"#fff",boxSizing:"border-box"}}/>
          </div>
          {errors.bidPrice&&<div style={{fontSize:"0.7rem",color:"#dc2626",marginTop:3}}>{errors.bidPrice}</div>}
          {form.bidPrice&&!errors.bidPrice&&Number(form.bidPrice)>0&&(
            <div style={{fontSize:"0.72rem",color:"#059669",marginTop:3,fontWeight:600}}>= {formatCurrency(Number(form.bidPrice))}</div>
          )}
        </div>
        <div style={{marginBottom:12}}>
          <label style={{display:"block",fontSize:"0.75rem",fontWeight:600,color:TX,marginBottom:4}}>{tl("agent")}</label>
          <select value={form.agent} onChange={e=>setForm(p=>({...p,agent:e.target.value}))}
            style={{width:"100%",padding:"10px 12px",borderRadius:9,outline:"none",fontSize:"0.82rem",color:TX,border:`1px solid ${BR}`,background:"#fff",boxSizing:"border-box"}}>
            {AGENT_NAMES.map(a=><option key={a}>{a}</option>)}
          </select>
        </div>
        <div style={{marginBottom:18}}>
          <label style={{display:"block",fontSize:"0.75rem",fontWeight:600,color:TX,marginBottom:4}}>{tl("remarks")}</label>
          <textarea placeholder="Inspection notes, payment terms..." value={form.remarks}
            onChange={e=>setForm(p=>({...p,remarks:e.target.value}))} rows={2}
            style={{width:"100%",padding:"10px 12px",borderRadius:9,outline:"none",resize:"vertical",fontSize:"0.82rem",color:TX,border:`1px solid ${BR}`,background:"#fff",boxSizing:"border-box"}}/>
        </div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={onClose}
            style={{flex:1,padding:"12px",borderRadius:10,fontWeight:600,fontSize:"0.85rem",border:`1px solid ${BR}`,background:"#f8fafc",color:MT,cursor:"pointer"}}>
            Cancel
          </button>
          <button onClick={submit} disabled={loading}
            style={{flex:2,padding:"12px",borderRadius:10,fontWeight:700,fontSize:"0.88rem",border:"none",cursor:"pointer",
                    background:`linear-gradient(135deg,${N},${B})`,color:"#fff",opacity:loading?0.7:1,
                    display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            {loading?<><Loader2 size={14}/> {tl("submitting")}</>:tl("submitBidBtn")}
          </button>
        </div>
        <p style={{textAlign:"center",fontSize:"0.68rem",color:HI,marginTop:10}}>{tl("bidPrivate")}</p>
      </div>
    </div>
  );
}

            <input type={k==="mobile"?"tel":"text"} placeholder={p} value={form[k]}
              onChange={e=>setForm(x=>({...x,[k]:e.target.value}))}
              style={{width:"100%",padding:"10px 12px",borderRadius:9,outline:"none",fontSize:"0.85rem",color:TX,border:`1px solid ${BR}`,background:"#fff",boxSizing:"border-box"}}/>
          </div>
        ))}
        <div style={{marginBottom:12}}>
          <label style={{display:"block",fontSize:"0.75rem",fontWeight:600,color:TX,marginBottom:4}}>{tl("message")}</label>
          <textarea placeholder="Your enquiry..." value={form.message} onChange={e=>setForm(p=>({...p,message:e.target.value}))} rows={2}
            style={{width:"100%",padding:"10px 12px",borderRadius:9,outline:"none",resize:"vertical",fontSize:"0.82rem",color:TX,border:`1px solid ${BR}`,background:"#fff",boxSizing:"border-box"}}/>
        </div>
        <div style={{marginBottom:18}}>
          <label style={{display:"block",fontSize:"0.75rem",fontWeight:600,color:TX,marginBottom:4}}>{tl("agent")}</label>
          <select value={form.agent} onChange={e=>setForm(p=>({...p,agent:e.target.value}))}
            style={{width:"100%",padding:"10px 12px",borderRadius:9,outline:"none",fontSize:"0.82rem",color:TX,border:`1px solid ${BR}`,background:"#fff",boxSizing:"border-box"}}>
            {AGENT_NAMES.map(a=><option key={a}>{a}</option>)}
          </select>
        </div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={onClose} style={{flex:1,padding:"12px",borderRadius:10,fontWeight:600,fontSize:"0.85rem",border:`1px solid ${BR}`,background:"#f8fafc",color:MT,cursor:"pointer"}}>Cancel</button>
          <button onClick={submit} disabled={loading}
            style={{flex:2,padding:"12px",borderRadius:10,fontWeight:700,fontSize:"0.88rem",border:"none",cursor:"pointer",
                    background:`linear-gradient(135deg,${N},${B})`,color:"#fff",
                    display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            {loading?<><Loader2 size={14}/> {tl("sending")}</>:tl("sendEnquiry")}
          </button>
        </div>
      </div>
    </div>
  );
}

function SavedCars({ cars, savedIds, onContact, onBid, toggleSave, tl }) {
  const saved=cars.filter(c=>savedIds.includes(c.id));
  return (
    <div style={{padding:"16px 14px"}}>
      <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"1rem",color:TX,marginBottom:12}}>{tl("savedCars")} ({saved.length})</div>
      {saved.length===0?(
        <div style={{textAlign:"center",padding:"48px 20px"}}>
          <Heart size={44} style={{color:BR,margin:"0 auto 12px"}}/>
          <div style={{color:MT,fontSize:"0.88rem",fontWeight:600}}>{tl("noSaved")}</div>
          <div style={{color:HI,fontSize:"0.78rem",marginTop:6}}>{tl("tapToSave")}</div>
        </div>
      ):(
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {saved.map(c=><CarCard key={c.id} car={c} onContact={onContact} onBid={onBid} saved={true} toggleSave={toggleSave} tl={tl}/>)}
        </div>
      )}
    </div>
  );
}

function ContactPage({ tl }) {
  return (
    <div style={{padding:"16px 14px"}}>
      <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"1rem",color:TX,marginBottom:16}}>{tl("contactUs")}</div>
      <div style={{display:"flex",flexDirection:"column",gap:10}}>
        {[
          {icon:MessageCircle,label:"WhatsApp",val:tl("chatNow"),href:`https://wa.me/${CONFIG.WHATSAPP_NUMBER}`,bg:"#22c55e"},
          {icon:Phone,label:tl("callNow"),val:CONFIG.CALL_NUMBER,href:`tel:${CONFIG.CALL_NUMBER}`,bg:N},
        ].map(c=>(
          <a key={c.label} href={c.href} target="_blank" rel="noopener noreferrer"
             style={{display:"flex",alignItems:"center",gap:14,padding:"16px",borderRadius:14,
                     border:`1px solid ${BR}`,background:"#fff",textDecoration:"none",boxShadow:"0 2px 8px rgba(30,58,138,0.05)"}}>
            <div style={{width:44,height:44,borderRadius:12,background:c.bg,display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
              <c.icon size={20} style={{color:"#fff"}}/>
            </div>
            <div>
              <div style={{fontWeight:700,fontSize:"0.9rem",color:TX}}>{c.label}</div>
              <div style={{fontSize:"0.78rem",color:MT,marginTop:2}}>{c.val}</div>
            </div>
            <ChevronRight size={16} style={{color:HI,marginLeft:"auto"}}/>
          </a>
        ))}
        <div style={{background:"#fff",border:`1px solid ${BR}`,borderRadius:14,padding:"14px",marginTop:4}}>
          <div style={{fontWeight:700,fontSize:"0.82rem",color:TX,marginBottom:10}}>{tl("ourAgents")}</div>
          {AGENT_NAMES.map(a=>(
            <div key={a} style={{display:"flex",alignItems:"center",gap:10,padding:"7px 0",borderBottom:`1px solid ${BG}`}}>
              <div style={{width:30,height:30,borderRadius:"50%",background:TI,display:"flex",alignItems:"center",justifyContent:"center"}}>
                <User size={13} style={{color:N}}/>
              </div>
              <span style={{fontSize:"0.82rem",color:TX}}>{a}</span>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

function HeroBanner({ carsCount, tl }) {
  return (
    <div style={{background:`linear-gradient(135deg,${N} 0%,${B} 100%)`,padding:"18px 16px 14px",color:"#fff"}}>
      <div style={{display:"inline-flex",alignItems:"center",gap:6,background:"rgba(255,255,255,0.12)",
                   borderRadius:20,padding:"3px 12px",marginBottom:10}}>
        <Shield size={10} style={{color:"#93c5fd"}}/>
        <span style={{fontSize: "0.98rem",fontWeight: "normal",color: "#93c5fd",letterSpacing: "0.1em",textTransform: "none"}}> {tl("tagline")}</span>
      </div>
      <h1 style={{fontFamily:"'Syne',sans-serif",fontWeight:900,fontSize:"1.35rem",lineHeight:1.1,margin:"0 0 2px",letterSpacing:"-0.02em"}}>{tl("hero1")}</h1>
      <h2 style={{fontFamily:"'Cormorant Garamond',serif",fontStyle:"italic",fontWeight:500,fontSize:"1.05rem",margin:"0 0 14px",color:"#93c5fd"}}>{tl("hero2")}</h2>
      <div style={{display:"flex",gap:20}}>
        {[[`${carsCount}+`,tl("carsListed")],["15+",tl("partnerBanks")],["50+",tl("cities")]].map(([v,l])=>(
          <div key={l}>
            <div style={{fontWeight:800,fontSize:"1.05rem",lineHeight:1}}>{v}</div>
            <div style={{fontSize:"0.62rem",color:"rgba(255,255,255,0.6)",textTransform:"uppercase",letterSpacing:"0.08em",marginTop:2}}>{l}</div>
          </div>
        ))}
      </div>
    </div>
  );
}

function BottomNav({ view, setView, savedCount, tl }) {
  const tabs=[{key:"home",icon:Home,label:tl("home")},{key:"saved",icon:Heart,label:tl("saved"),badge:savedCount},{key:"contact",icon:MessageSquare,label:tl("contact")}];
  return (
    <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:100,background:"#fff",borderTop:`1px solid ${BR}`,display:"flex",padding:"6px 0 8px",boxShadow:"0 -4px 20px rgba(30,58,138,0.08)"}}>
      {tabs.map(t=>{
        const on=view===t.key;
        const Icon=t.icon;
        return (
          <button key={t.key} onClick={()=>setView(t.key)}
            style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,border:"none",background:"none",cursor:"pointer",padding:"4px 0",position:"relative"}}>
            {t.badge>0&&(
              <span style={{position:"absolute",top:0,right:"calc(50% - 16px)",background:"#ef4444",color:"#fff",fontSize:"0.58rem",fontWeight:700,padding:"1px 4px",borderRadius:8}}>{t.badge}</span>
            )}
            <Icon size={20} style={{color:on?N:HI}}/>
            <span style={{fontSize:"0.65rem",fontWeight:on?700:500,color:on?N:HI}}>{t.label}</span>
          </button>
        );
      })}
    </div>
  );
}

function App() {
  const [cars,setCars]=useState([]);
  const [lang,setLang]=useState('en');
  const tl=(key)=>t(lang,key);
  const [master,setMaster]=useState(SAMPLE_MASTER);
  const [loading,setLoading]=useState(true);
  const [searchTerm,setSearchTerm]=useState("");
  const [statusTab,setStatusTab]=useState("all");
  const [filters,setFilters]=useState({});
  const [saved,setSaved]=useState([]);
  const [view,setView]=useState("home");
  const [contactCar,setContactCar]=useState(null);
  const [bidCar,setBidCar]=useState(null);
  const [toasts,setToasts]=useState([]);

  useEffect(()=>{
    if(!document.getElementById("s24-fonts")){
      const l=document.createElement("link");l.id="s24-fonts";l.rel="stylesheet";
      l.href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400;1,500;1,600;1,700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=DM+Mono:wght@400;500&family=Syne:wght@700;800;900&display=swap";
      document.head.appendChild(l);
    }
    document.body.style.cssText="margin:0;padding:0;background:#F8FAFF;font-family:'DM Sans',sans-serif;";
  },[]);

  useEffect(()=>{
    if(!CONFIG.TAWKTO_ID||document.getElementById("tawk-script"))return;
    const s=document.createElement("script");s.id="tawk-script";s.async=true;
    s.src=`https://embed.tawk.to/${CONFIG.TAWKTO_ID}/default`;s.charset="UTF-8";s.setAttribute("crossorigin","*");
    document.body.appendChild(s);
  },[]);

  useEffect(()=>{
    if(CONFIG.DEMO_MODE||!CONFIG.APPS_SCRIPT_URL||CONFIG.APPS_SCRIPT_URL.includes("YOUR_")){
      setCars(SAMPLE_CARS);setMaster(SAMPLE_MASTER);setLoading(false);return;
    }
    (async()=>{
      try{
        const res=await fetch(`${CONFIG.APPS_SCRIPT_URL}?action=getData`);
        const d=await res.json();
        if(d.cars?.length)setCars(d.cars);else setCars(SAMPLE_CARS);
        if(d.master)setMaster({...SAMPLE_MASTER,...d.master});
      }catch{setCars(SAMPLE_CARS);setMaster(SAMPLE_MASTER);}
      finally{setLoading(false);}
    })();
  },[]);

  const addToast=useCallback((message,type="info")=>{const id=Date.now();setToasts(t=>[...t,{id,message,type}]);setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),4000);},[]);
  const removeToast=useCallback((id)=>setToasts(t=>t.filter(x=>x.id!==id)),[]);
  const toggleSave=useCallback((id)=>setSaved(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]),[]);

  const filtered=useMemo(()=>{
    let out=cars;
    if(statusTab!=="all")out=out.filter(c=>(c.status||"").toLowerCase()===statusTab);
    if(searchTerm){const q=searchTerm.toLowerCase();out=out.filter(c=>[c.make,c.model,c.regNo,c.city,c.state,c.bank,c.parkingYard,c.fuelType].some(v=>(v||"").toLowerCase().includes(q)));}
    Object.entries(filters).forEach(([k,vals])=>{if(vals.length)out=out.filter(c=>vals.includes(c[k]));});
    return out;
  },[cars,statusTab,searchTerm,filters]);

  const counts=useMemo(()=>({
    all:cars.length,
    available:cars.filter(c=>c.status?.toLowerCase()==="available").length,
    pending:cars.filter(c=>c.status?.toLowerCase()==="pending").length,
    sold:cars.filter(c=>c.status?.toLowerCase()==="sold").length,
  }),[cars]);

  const sorted=useMemo(()=>[...filtered].sort((a,b)=>(b.featured?1:0)-(a.featured?1:0)),[filtered]);

  const handleContact=useCallback(async(formData)=>{
    try{
      if(!CONFIG.DEMO_MODE&&!CONFIG.APPS_SCRIPT_URL.includes("YOUR_"))
        await fetch(CONFIG.APPS_SCRIPT_URL,{method:"POST",mode:"no-cors",body:JSON.stringify({action:"submitEnquiry",...formData})});
      setCars(prev=>prev.map(c=>c.id===formData.carId?{...c,contactCount:(c.contactCount||0)+1}:c));
      addToast("Enquiry submitted! Our agent will contact you shortly.","success");
    }catch{addToast("Submitted! We'll get back to you soon.","success");}
  },[addToast]);

  const handleBid=useCallback(async(formData)=>{
    try{
      if(!CONFIG.DEMO_MODE&&!CONFIG.APPS_SCRIPT_URL.includes("YOUR_"))
        await fetch(CONFIG.APPS_SCRIPT_URL,{method:"POST",mode:"no-cors",body:JSON.stringify({action:"submitDealerResponse",...formData})});
      setCars(prev=>prev.map(c=>c.id===formData.carId?{...c,dealerCount:(c.dealerCount||0)+1}:c));
      addToast(`Bid of ₹${Number(formData.bidPrice).toLocaleString("en-IN")} submitted!`,"success");
    }catch{addToast("Bid submitted! Our team will review it.","success");}
  },[addToast]);

  return (
    <div style={{minHeight:"100vh",background:BG,paddingBottom:72}}>
      <Header searchTerm={searchTerm} setSearchTerm={setSearchTerm} lang={lang} setLang={setLang} tl={tl}/>
      <div style={{paddingTop:54}}>
        {view==="home"&&(
          <>
            <HeroBanner carsCount={cars.length} tl={tl}/>
            <StatusTabs active={statusTab} onChange={setStatusTab} counts={counts} tl={tl}/>
            <FilterChips master={master} filters={filters} setFilters={setFilters} tl={tl}/>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px 6px"}}>
              <span style={{fontSize:"0.78rem",fontWeight:600,color:MT}}>
                {loading?tl("loading"):`${sorted.length} ${tl("carsFound")}`}
              </span>
              {Object.values(filters).flat().length>0&&(
                <button onClick={()=>setFilters({})} style={{fontSize:"0.72rem",color:N,fontWeight:600,background:"none",border:"none",cursor:"pointer"}}>{tl("clearFilters")}</button>
              )}
            </div>
            <div style={{padding:"0 14px",display:"flex",flexDirection:"column",gap:10}}>
              {loading?Array(4).fill(0).map((_,i)=>(
                <div key={i} style={{background:"#fff",borderRadius:14,height:130,border:`1px solid ${BR}`,animation:"pulse 1.5s ease-in-out infinite"}}/>
              )):sorted.length===0?(
                <div style={{textAlign:"center",padding:"48px 20px"}}>
                  <Car size={48} style={{color:BR,margin:"0 auto 12px"}}/>
                  <div style={{color:MT,fontSize:"0.9rem",fontWeight:600}}>{tl("noCarFound")}</div>
                  <div style={{color:HI,fontSize:"0.78rem",marginTop:6}}>{tl("adjustFilters")}</div>
                </div>
              ):sorted.map(c=>(
                <CarCard key={c.id} car={c} onContact={setContactCar} onBid={setBidCar}
                  saved={saved.includes(c.id)} toggleSave={toggleSave} tl={tl}/>
              ))}
            </div>
          </>
        )}
        {view==="saved"&&<SavedCars cars={cars} savedIds={saved} onContact={setContactCar} onBid={setBidCar} toggleSave={toggleSave} tl={tl}/>}
        {view==="contact"&&<ContactPage tl={tl}/>}
      </div>

      <BottomNav view={view} setView={setView} savedCount={saved.length} tl={tl}/>

      {contactCar&&<ContactModal car={contactCar} onClose={()=>setContactCar(null)} onSubmit={handleContact} tl={tl}/>}
      {bidCar&&<BidModal car={bidCar} onClose={()=>setBidCar(null)} onSubmit={handleBid} tl={tl}/>}

      <Toast toasts={toasts} remove={removeToast}/>

      <a href={`https://wa.me/${CONFIG.WHATSAPP_NUMBER}?text=Hi! I'm interested in a repo car from Suraksha24`}
         target="_blank" rel="noopener noreferrer"
         style={{position:"fixed",bottom:76,right:16,zIndex:99,width:46,height:46,background:"#22c55e",borderRadius:"50%",
                 display:"flex",alignItems:"center",justifyContent:"center",boxShadow:"0 4px 16px rgba(34,197,94,0.4)",textDecoration:"none"}}>
        <MessageCircle size={21} style={{color:"#fff"}}/>
      </a>

      <style>{`@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}@keyframes spin{to{transform:rotate(360deg)}}*{box-sizing:border-box}::-webkit-scrollbar{height:3px;width:4px}::-webkit-scrollbar-thumb{background:#BFDBFE;border-radius:4px}input::placeholder,textarea::placeholder{color:#94a3b8}`}</style>
    </div>
  );
}

document.getElementById('loader').style.display='none';
ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
  </script>
</body>
</html>
