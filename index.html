// 🌐  LANGUAGE SWITCHER
// ============================================================
function LangSwitcher({ lang, setLang }) {
  const [open, setOpen] = useState(false);
  const ref = useRef();
  useEffect(() => {
    const fn = e => { if(ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", fn);
    return () => document.removeEventListener("mousedown", fn);
  }, []);
  const cur = LANGS.find(l => l.code === lang) || LANGS[0];
  return (
    <div ref={ref} style={{position:"relative"}}>
      <button onClick={() => setOpen(o => !o)}
        style={{background:"rgba(212,175,55,0.12)",border:"1px solid rgba(212,175,55,0.5)",
                borderRadius:8,padding:"5px 10px",cursor:"pointer",color:"#D4AF37",display:"flex",
                alignItems:"center",gap:4,fontSize:"0.78rem",fontWeight:700}}>
        <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="#D4AF37" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round">
          <circle cx="12" cy="12" r="10"/><line x1="2" y1="12" x2="22" y2="12"/>
          <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
        </svg>
        {cur.native}
        <ChevronDown size={10} style={{color:"#D4AF37",transform:open?"rotate(180deg)":"none",transition:"transform 0.15s"}}/>
      </button>
      {open && (
        <div style={{position:"absolute",top:"calc(100% + 6px)",right:0,zIndex:300,
                     background:"#fff",borderRadius:10,border:"1px solid #E2E8F0",
                     boxShadow:"0 8px 24px rgba(30,58,138,0.15)",minWidth:130,padding:"4px 0"}}>
          {LANGS.map(l => (
            <button key={l.code} onClick={() => { setLang(l.code); setOpen(false); }}
              style={{width:"100%",display:"flex",alignItems:"center",gap:8,padding:"8px 14px",
                      border:"none",cursor:"pointer",background:lang===l.code?"#EEF2FF":"transparent",
                      fontSize:"0.82rem",fontWeight:lang===l.code?700:400,
                      color:lang===l.code?"#1E3A8A":"#0A1628",textAlign:"left"}}>
              <span style={{fontSize:"1rem",minWidth:20}}>{l.native}</span>
              <span>{l.label}</span>
              {lang===l.code && <Check size={12} style={{color:"#1E3A8A",marginLeft:"auto"}}/>}
            </button>
          ))}
        </div>
      )}
    </div>
  );
}

function Toast({ toasts, remove }) {
  if(!toasts.length) return null;
  const t = toasts[toasts.length - 1]; // Show latest one centered
  return (
    <div style={{position:"fixed",inset:0,zIndex:9999,display:"flex",
                 alignItems:"center",justifyContent:"center",
                 pointerEvents:"none",padding:24}}>
      <div key={t.id} className="modal-card" style={{
        pointerEvents:"auto",
        display:"flex",flexDirection:"column",alignItems:"center",
        gap:12,padding:"28px 32px",
        borderRadius:20,color:"#fff",
        textAlign:"center",maxWidth:320,width:"100%",
        background:t.type==="success"
          ? "linear-gradient(135deg,#059669,#047857)"
          : t.type==="error"
          ? "linear-gradient(135deg,#dc2626,#b91c1c)"
          : `linear-gradient(135deg,${N},${B})`,
        boxShadow:"0 24px 64px rgba(0,0,0,0.35)"
      }}>
        <div style={{
          width:52,height:52,borderRadius:"50%",
          background:"rgba(255,255,255,0.2)",
          display:"flex",alignItems:"center",justifyContent:"center"
        }}>
          {t.type==="success"
            ? <Check size={26}/>
            : t.type==="error"
            ? <AlertCircle size={26}/>
            : <Bell size={26}/>}
        </div>
        <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,
                     fontSize:"1rem",lineHeight:1.3}}>
          {t.type==="success" ? "Success!" : t.type==="error" ? "Oops!" : "Notice"}
        </div>
        <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:"0.85rem",
                     opacity:0.92,lineHeight:1.5}}>{t.message}</div>
        <button onClick={()=>remove(t.id)}
          style={{marginTop:4,padding:"9px 28px",borderRadius:30,border:"2px solid rgba(255,255,255,0.5)",
                  background:"rgba(255,255,255,0.15)",color:"#fff",cursor:"pointer",
                  fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"0.82rem"}}>
          OK
        </button>
      </div>
    </div>
  );
}

function FilterChips({ master, filters, setFilters, tl }) {
  const groups=[
    {key:"bank",        label:tl("bank"),         options:master.banks||[]},
    {key:"make",        label:tl("make"),         options:master.makes||[]},
    {key:"state",       label:tl("state"),        options:master.states||[]},
    {key:"parkingYard", label:tl("parkingYard"), options:master.parkingYards||[]},
    {key:"fuelType",    label:tl("fuel"),         options:master.fuelTypes||["Petrol","Diesel","CNG","Petrol+CNG","Electric","Hybrid"]},
    {key:"rcStatus",    label:tl("rcStatusLabel"), options:master.rcStatuses||["Original","Lost","Photocopy"]},
  ];
  const [open,setOpen]=useState(null);
  const ref=useRef();
  useEffect(()=>{
    const fn=(e)=>{if(ref.current&&!ref.current.contains(e.target))setOpen(null);};
    document.addEventListener("mousedown",fn);
    return()=>document.removeEventListener("mousedown",fn);
  },[]);
  const toggle=(key,val)=>setFilters(prev=>{const c=prev[key]||[];return{...prev,[key]:c.includes(val)?c.filter(x=>x!==val):[...c,val]};});
  const activeCount=Object.values(filters).flat().length;
  return (
    <div ref={ref} style={{background:"#fff",borderBottom:`1px solid ${BR}`,padding:"8px 14px",position:"relative"}}>
      <div style={{display:"flex",gap:7,overflowX:"auto",paddingBottom:2}}>
        {activeCount>0&&(
          <button onClick={()=>setFilters({})}
            style={{flexShrink:0,display:"flex",alignItems:"center",gap:4,padding:"5px 10px",borderRadius:20,
                    border:"1px solid #fca5a5",background:"#fee2e2",color:"#dc2626",fontSize:"0.75rem",fontWeight:600,cursor:"pointer",whiteSpace:"nowrap"}}>
            <X size={11}/> {tl("clear")} ({activeCount})
          </button>
        )}
        {groups.map(g=>{
          const active=(filters[g.key]||[]).length>0;
          const isOpen=open===g.key;
          return (
            <div key={g.key} style={{position:"relative",flexShrink:0}}>
              <button onClick={()=>setOpen(isOpen?null:g.key)}
                style={{display:"flex",alignItems:"center",gap:5,padding:"5px 12px",borderRadius:20,cursor:"pointer",whiteSpace:"nowrap",
                        fontSize:"0.78rem",fontWeight:active?700:500,
                        border:active?`1.5px solid ${N}`:`1px solid ${BR}`,
                        background:active?TI:"#f8fafc",color:active?N:MT}}>
                {g.label}
                {active&&<span style={{background:N,color:"#fff",fontSize:"0.62rem",fontWeight:700,padding:"1px 5px",borderRadius:8}}>{(filters[g.key]||[]).length}</span>}
                <ChevronDown size={11} style={{transition:"transform 0.15s",transform:isOpen?"rotate(180deg)":"none"}}/>
              </button>
              {isOpen&&(
                <div style={{position:"absolute",top:"calc(100% + 6px)",left:0,zIndex:200,background:"#fff",
                             border:`1px solid ${BR}`,borderRadius:12,boxShadow:"0 8px 24px rgba(30,58,138,0.12)",
                             minWidth:180,maxHeight:260,overflowY:"auto",padding:"6px 0"}}>
                  {g.options.map(opt=>{
                    const sel=(filters[g.key]||[]).includes(opt);
                    return (
                      <button key={opt} onClick={()=>toggle(g.key,opt)}
                        style={{width:"100%",display:"flex",alignItems:"center",gap:10,padding:"8px 14px",border:"none",
                                cursor:"pointer",background:sel?TI:"transparent",fontSize:"0.82rem",color:sel?N:TX,fontWeight:sel?600:400,textAlign:"left"}}>
                        <div style={{width:16,height:16,borderRadius:4,flexShrink:0,border:`1.5px solid ${sel?N:BR}`,
                                     background:sel?N:"transparent",display:"flex",alignItems:"center",justifyContent:"center"}}>
                          {sel&&<Check size={10} style={{color:"#fff"}}/>}
                        </div>
                        {opt}
                      </button>
                    );
                  })}
                </div>
              )}
            </div>
          );
        })}
      </div>
    </div>
  );
}

const tlFuel=(f,t)=>({'Petrol':t('petrol'),'Diesel':t('diesel'),'CNG':t('cng'),'Petrol+CNG':t('petrolCng'),'Electric':t('electric'),'Hybrid':t('hybrid')}[f]||f);
const tlRC=(r,t)=>({'Original':t('rcOriginal'),'Lost':t('rcLost'),'Photocopy':t('rcPhotocopy')}[r]||r);
const tlSt=(s,t)=>({'For Sale':t('forSale'),'Upcoming':t('upcoming'),'Bulk Deals':t('bulkDeals'),'Total Loss':t('totalLoss'),'Not in Running Condition':t('notRunning'),'Blacklisted':t('blacklisted'),'Disputed':t('disputed')}[s]||s);
function CarCard({ car, onContact, onBid, saved, toggleSave, tl }) {

    const text=`${car.regYear} ${car.make} ${car.model} (${car.regNo}) — ${formatCurrency(car.highestBid)} | Suraksha24`;
    try{await(navigator.share?navigator.share({title:"Suraksha24",text}):navigator.clipboard.writeText(text));}catch(e){}
    setShared(true);setTimeout(()=>setShared(false),2000);

    <div style={{background:"#fff",borderRadius:14,overflow:"hidden",
                 border:car.featured?`1.5px solid ${N}`:`1px solid ${BR}`,

      onMouseEnter={e=>{if(!disabled){e.currentTarget.style.boxShadow="0 8px 24px rgba(30,58,138,0.13)";e.currentTarget.style.transform="translateY(-2px)";}}}

        </div>

      <div style={{display:"flex"}}>
        <div style={{width:110,flexShrink:0,background:`linear-gradient(135deg,${TI},#DBEAFE)`,
                     display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",
                     padding:"10px 5px",position:"relative"}}>
          <Car size={30} style={{color:N,opacity:0.55}}/>

            <div style={{fontFamily:"'DM Sans',sans-serif",fontWeight:700,

function BidModal({ car, bundle, onClose, onSubmit, tl }) {
  const [form,setForm]=useState({dealerName:car._prefillName||"",mobile:"",bidPrice:"",remarks:"",agent:AGENT_NAMES[0]});
  const [loading,setLoading]=useState(false);
  const [errors,setErrors]=useState({});
  const validate=()=>{
    const e={};
    if(!form.dealerName.trim())e.dealerName=tl("required");
    if(!/^\d{10}$/.test(form.mobile))e.mobile=tl("validMobile");
    if(!form.bidPrice||isNaN(form.bidPrice)||Number(form.bidPrice)<=0)e.bidPrice=tl("validAmount");
    setErrors(e);return Object.keys(e).length===0;
  };
  const submit=async()=>{
    if(!validate())return;
    setLoading(true);
    try {
      await onSubmit({
        ...form,
        carId:    bundle ? `Bundle:${bundle.dealId}` : car.id,
        regNo:    bundle ? `Bundle:${bundle.dealId}` : car.regNo,
        carName:  bundle ? `Bundle Deal ${bundle.dealId}` : `${car.make} ${car.model}`,
        dealId:   bundle ? bundle.dealId : "",
        dealerName: form.dealerName || ""
      });
      onClose();
    } catch(e) {
      console.error("Bid error:", e);
    } finally {
      setLoading(false);
    }
  };
  const inp=(label,key,ph,type="text")=>(
    <div style={{marginBottom:12}}>
      <label style={{display:"block",fontSize:"0.75rem",fontWeight:600,color:TX,marginBottom:4}}>{label}</label>
      <input type={type} placeholder={ph} value={form[key]} onChange={e=>setForm(p=>({...p,[key]:e.target.value}))}
        style={{width:"100%",padding:"10px 12px",borderRadius:9,outline:"none",fontSize:"0.85rem",color:TX,
                border:`1.5px solid ${errors[key]?"#fca5a5":BR}`,background:errors[key]?"#fff5f5":"#fff",boxSizing:"border-box"}}/>
      {errors[key]&&<div style={{fontSize:"0.7rem",color:"#dc2626",marginTop:3}}>{errors[key]}</div>}
    </div>
  );
  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.45)",zIndex:500,display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"}}
         onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-card" style={{background:"#fff",borderRadius:20,width:"100%",maxWidth:480,padding:"24px 24px 32px",maxHeight:"90vh",boxShadow:"0 32px 80px rgba(0,0,0,0.35)",overflowY:"auto"}}>
        
        {bundle ? (
          <div style={{background:"#f5f3ff",border:"1px solid #ddd6fe",borderRadius:10,padding:"12px 14px",marginBottom:14}}>
            <div style={{display:"flex",alignItems:"center",gap:6,marginBottom:8}}>
              <span style={{fontSize:"1rem"}}>📦</span>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"0.88rem",color:"#5b21b6"}}>Bundle Deal — {bundle.dealId}</div>
            </div>
            {bundle.cars.map(c=>(
              <div key={c.id} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",
                                       borderBottom:"1px solid #ede9fe",fontSize:"0.75rem",
                                       fontFamily:"'DM Sans',sans-serif"}}>
                <span style={{color:TX,fontWeight:500}}>{c.make} {c.model} {c.variant||""} · {c.regNo}</span>
                <span style={{color:"#5b21b6",fontWeight:700}}>{formatCurrency(c.highestBid)}</span>
              </div>
            ))}
            <div style={{display:"flex",justifyContent:"space-between",marginTop:8,padding:"6px 0 0",
                         fontFamily:"'DM Sans',sans-serif",fontWeight:800,fontSize:"0.9rem",
                         borderTop:"2px solid #ddd6fe"}}>
              <span style={{color:"#5b21b6"}}>Bundle Total</span>
              <span style={{color:"#5b21b6"}}>{formatCurrency(bundle.cars.reduce((s,c)=>s+(c.highestBid||0),0))}</span>
            </div>
          </div>
        ) : (
          <div style={{background:TI,border:`1px solid ${BO}`,borderRadius:10,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:10}}>
            <Car size={26} style={{color:N,flexShrink:0}}/>
            <div>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:900,fontSize:"0.9rem",color:TX}}>{car.make} {car.model} {car.variant||""} {car.regYear}</div>
              <div style={{fontFamily:"'DM Mono',monospace",fontSize:"0.7rem",color:N,marginTop:2}}>{car.regNo} · Base: {formatCurrency(car.highestBid)}</div>
            </div>
          </div>
        )}
        <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"0.95rem",color:TX,marginBottom:14}}>{bundle?"Submit Bundle Bid":tl("submitBid")}</div>
        {inp("Dealer / Company Name *","dealerName","e.g. Sharma Auto Pvt Ltd")}
        {inp("Mobile Number *","mobile","10-digit mobile","tel")}
        <div style={{marginBottom:12}}>

              style={{width:"100%",padding:"10px 12px 10px 28px",borderRadius:9,outline:"none",fontSize:"0.88rem",fontWeight:700,color:TX,
                      border:`1.5px solid ${errors.bidPrice?"#fca5a5":BR}`,background:errors.bidPrice?"#fff5f5":"#fff",boxSizing:"border-box"}}/>
          </div>
          {errors.bidPrice&&<div style={{fontSize:"0.7rem",color:"#dc2626",marginTop:3}}>{errors.bidPrice}</div>}

          )}
        </div>
        <div style={{marginBottom:12}}>
          <label style={{display:"block",fontSize:"0.75rem",fontWeight:600,color:TX,marginBottom:4}}>{tl("agent")}</label>
          <select value={form.agent} onChange={e=>setForm(p=>({...p,agent:e.target.value}))}

            {AGENT_NAMES.map(a=><option key={a}>{a}</option>)}
          </select>
        </div>
        <div style={{marginBottom:18}}>
          <label style={{display:"block",fontSize:"0.75rem",fontWeight:600,color:TX,marginBottom:4}}>{tl("remarks")}</label>
          <textarea placeholder="Inspection notes, payment terms..." value={form.remarks}

        </div>
        <div style={{display:"flex",gap:10}}>
          <button onClick={onClose}

          <button onClick={submit} disabled={loading}

                    display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
            {loading?<><Loader2 size={14}/> {tl("submitting")}</>:tl("submitBidBtn")}

        <p style={{textAlign:"center",fontSize:"0.68rem",color:HI,marginTop:10}}>{tl("bidPrivate")}</p>
      </div>
    </div>
  );
}

function FeedbackModal({ onClose, onSubmit }) {
  const [form, setForm] = useState({ name:"", mobile:"", rating:0, feedback:"" });
  const [loading, setLoading] = useState(false);
  const [done, setDone] = useState(false);
  const set = (k,v) => setForm(p=>({...p,[k]:v}));

  const submit = async () => {
    if(!form.rating || !form.feedback.trim() || !form.name.trim() || !/^\d{10}$/.test(form.mobile)) return;
    setLoading(true);
    await onSubmit(form);
    setLoading(false);
    setDone(true);
    setTimeout(onClose, 2000);
  };

  return (
    <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:600,
                 display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"}}
         onClick={e=>e.target===e.currentTarget&&onClose()}>
      <div className="modal-card" style={{background:"#fff",borderRadius:20,width:"100%",
                   maxWidth:500,padding:"20px 20px 36px",maxHeight:"90vh",overflowY:"auto"}}>
        

        {done ? (
          <div style={{textAlign:"center",padding:"32px 0"}}>
            <div style={{fontSize:"3rem",marginBottom:12}}>🙏</div>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"1.1rem",color:"#0A1628"}}>
              Thank you!
            </div>
            <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:"0.85rem",color:"#64748b",marginTop:6}}>
              Your feedback helps us improve.
            </div>
          </div>
        ) : (
          <>
            <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"1rem",
                         color:"#0A1628",marginBottom:4}}>Your Feedback</div>
            <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:"0.78rem",
                         color:"#64748b",marginBottom:20}}>Our Improvements</div>

            {/* Star Rating */}
            <div style={{marginBottom:16}}>
              <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:"0.75rem",fontWeight:600,
                           color:"#0A1628",marginBottom:8}}>Rate your experience *</div>
              <div style={{display:"flex",gap:8}}>
                {[1,2,3,4,5].map(s=>(
                  <button key={s} onClick={()=>set("rating",s)}
                    style={{fontSize:"1.8rem",background:"none",border:"none",cursor:"pointer",
                            transition:"transform 0.1s",transform:form.rating>=s?"scale(1.2)":"scale(1)"}}>
                    {form.rating>=s?"⭐":"☆"}
                  </button>
                ))}
              </div>
            </div>

            {/* Name */}
            <div style={{marginBottom:12}}>
              <label style={{display:"block",fontSize:"0.75rem",fontWeight:600,color:"#0A1628",
                             fontFamily:"'DM Sans',sans-serif",marginBottom:5}}>
                Your Name *
              </label>
              <input type="text" placeholder="e.g. Rahul Sharma *" value={form.name}
                onChange={e=>set("name",e.target.value)}
                style={{width:"100%",padding:"10px 14px",borderRadius:10,outline:"none",
                        fontFamily:"'DM Sans',sans-serif",fontSize:"0.85rem",color:"#0A1628",
                        border:"1px solid #E2E8F0",background:"#fff",boxSizing:"border-box"}}/>
            </div>

            {/* Mobile */}
            <div style={{marginBottom:12}}>
              <label style={{display:"block",fontSize:"0.75rem",fontWeight:600,color:"#0A1628",
                             fontFamily:"'DM Sans',sans-serif",marginBottom:5}}>
                Mobile Number *
              </label>
              <input type="tel" placeholder="10-digit mobile *" value={form.mobile}
                onChange={e=>set("mobile",e.target.value)}
                style={{width:"100%",padding:"10px 14px",borderRadius:10,outline:"none",
                        fontFamily:"'DM Sans',sans-serif",fontSize:"0.85rem",color:"#0A1628",
                        border:"1px solid #E2E8F0",background:"#fff",boxSizing:"border-box"}}/>
            </div>

            {/* Feedback */}
            <div style={{marginBottom:20}}>
              <label style={{display:"block",fontSize:"0.75rem",fontWeight:600,color:"#0A1628",
                             fontFamily:"'DM Sans',sans-serif",marginBottom:5}}>
                Your Feedback *
              </label>
              <textarea placeholder="Tell us what you liked, what can be improved..."
                value={form.feedback} onChange={e=>set("feedback",e.target.value)} rows={3}
                style={{width:"100%",padding:"10px 14px",borderRadius:10,outline:"none",resize:"vertical",
                        fontFamily:"'DM Sans',sans-serif",fontSize:"0.85rem",color:"#0A1628",
                        border:`1.5px solid ${!form.feedback.trim()&&form.rating?"#fca5a5":"#E2E8F0"}`,
                        background:"#fff",boxSizing:"border-box"}}/>
            </div>

            <div style={{display:"flex",gap:10}}>
              <button onClick={onClose}
                style={{flex:1,padding:"12px",borderRadius:10,border:"1px solid #E2E8F0",
                        background:"#f8fafc",fontFamily:"'DM Sans',sans-serif",

                        fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"0.88rem",
                        opacity:(!form.rating||!form.feedback.trim()||!form.name.trim()||!/^\d{10}$/.test(form.mobile))?0.5:1,
                        display:"flex",alignItems:"center",justifyContent:"center",gap:8}}>
                {loading?<><div style={{width:16,height:16,border:"2px solid rgba(255,255,255,0.3)",
                  borderTopColor:"#fff",borderRadius:"50%",animation:"spin 0.7s linear infinite"}}/>
                  Sending...</>:"Submit Feedback 🚀"}
              </button>
            </div>
          </>
        )}
      </div>
    </div>
  );

function KycUploadBox({ label, file, error, onCamera, onFile, onClear }) {
  return (
    <div style={{marginBottom:14}}>
      <div style={{fontFamily:"'DM Sans',sans-serif",fontWeight:600,fontSize:"0.75rem",
                   color:"#0A1628",marginBottom:8}}>{label}</div>
      {!file ? (
        <>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:8}}>
            <label style={{cursor:"pointer"}}>
              <div style={{border:`2px dashed ${error?"#fca5a5":"#BFDBFE"}`,borderRadius:12,
                           padding:"14px 8px",textAlign:"center",
                           background:error?"#fff5f5":"#EEF2FF"}}>
                <div style={{fontSize:"1.4rem",marginBottom:4}}>📷</div>
                <div style={{fontFamily:"'DM Sans',sans-serif",fontWeight:700,
                             fontSize:"0.72rem",color:"#1E3A8A"}}>Camera</div>
              </div>
              <input type="file" accept="image/*" capture="environment"
                onChange={onCamera} style={{display:"none"}}/>
            </label>
            <label style={{cursor:"pointer"}}>
              <div style={{border:`2px dashed ${error?"#fca5a5":"#BFDBFE"}`,borderRadius:12,
                           padding:"14px 8px",textAlign:"center",
                           background:error?"#fff5f5":"#EEF2FF"}}>
                <div style={{fontSize:"1.4rem",marginBottom:4}}>🖼️</div>
                <div style={{fontFamily:"'DM Sans',sans-serif",fontWeight:700,
                             fontSize:"0.72rem",color:"#1E3A8A"}}>Gallery</div>
              </div>
              <input type="file" accept="image/*,.pdf,application/pdf"
                onChange={onFile} style={{display:"none"}}/>
            </label>
          </div>
          {error&&<div style={{fontSize:"0.7rem",color:"#dc2626",marginTop:4,
                               fontFamily:"'DM Sans',sans-serif"}}>⚠️ {error}</div>}
        </>
      ) : (
        <div style={{border:"2px solid #1E3A8A",borderRadius:12,padding:"12px 14px",
                     background:"#EEF2FF",display:"flex",alignItems:"center",gap:10}}>
          <span style={{fontSize:"1.4rem"}}>✅</span>
          <div style={{flex:1,minWidth:0}}>
            <div style={{fontFamily:"'DM Sans',sans-serif",fontWeight:700,fontSize:"0.78rem",
                         color:"#1E3A8A",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>
              {file.name}
            </div>
            <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:"0.68rem",color:"#64748b",marginTop:2}}>
              {(file.size/1024/1024).toFixed(2)} MB
            </div>
          </div>
          <button onClick={onClear}
            style={{background:"none",border:"none",cursor:"pointer",
                    fontFamily:"'DM Sans',sans-serif",fontSize:"0.7rem",
                    fontWeight:600,color:"#dc2626",textDecoration:"underline",flexShrink:0}}>
            Remove
          </button>
        </div>
      )}
    </div>
  );
}

function ProfileForm({ user, onComplete }) {
  const [form, setForm] = useState({
    dealershipName:"", mobile:"", address:"",
    pinCode:"", city:"", state:"",
    interestType:"PAN INDIA", interestDetail:"", message:""
  });
  const [aadhaarFile,     setAadhaarFile]     = useState(null);
  const [aadhaarBackFile, setAadhaarBackFile] = useState(null);
  const [panFile, setPanFile]         = useState(null);
  const [pinLoading, setPinLoading]   = useState(false);
  const [pinError, setPinError]       = useState("");
  const [loading, setLoading]     = useState(false);
  const [errors, setErrors]       = useState({});
  const [step, setStep]           = useState(1); // 1=details, 2=kyc

  const set = (k,v) => setForm(p=>({...p,[k]:v}));

  const handleAadhaar = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    if(file.size > 10*1024*1024){ setErrors(p=>({...p,aadhaar:"Max 10MB allowed"})); return; }
    setAadhaarFile(file);
    setErrors(p=>({...p,aadhaar:""}));
  };
  const handleAadhaarBack = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    if(file.size > 10*1024*1024){ setErrors(p=>({...p,aadhaarBack:"Max 10MB allowed"})); return; }
    setAadhaarBackFile(file);
    setErrors(p=>({...p,aadhaarBack:""}));
  };
  const handlePan = (e) => {
    const file = e.target.files[0];
    if(!file) return;
    if(file.size > 10*1024*1024){ setErrors(p=>({...p,pan:"Max 10MB allowed"})); return; }
    setPanFile(file);
    setErrors(p=>({...p,pan:""}));
  };

  const validateStep1 = () => {
    const e={};
    if(!form.dealershipName.trim()) e.dealershipName="Required";
    if(!/^\d{10}$/.test(form.mobile)) e.mobile="Valid 10-digit number";
    if(!form.address.trim()) e.address="Required";
    if(!form.pinCode||form.pinCode.length!==6) e.pinCode="Valid PIN required";
    if(!form.city.trim()) e.city="Required";
    if(!form.state.trim()) e.state="Required";
    if(form.interestType!=="PAN INDIA"&&!form.interestDetail.trim()) e.interestDetail="Please specify";
    setErrors(e); return Object.keys(e).length===0;
  };

  const toBase64 = (file) => new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=e=>res(e.target.result.split(",")[1]);
    r.onerror=rej;
    r.readAsDataURL(file);
  });

  const submit = async () => {
    const e={};
    if(!aadhaarFile)     e.aadhaar="Please upload Aadhaar Front Side";
    if(!aadhaarBackFile) e.aadhaarBack="Please upload Aadhaar Back Side";
    if(!panFile) e.pan="Please upload your PAN Card";
    if(Object.keys(e).length){ setErrors(e); return; }
    setLoading(true);
    try {
      const [aadhaarB64, aadhaarBackB64, panB64] = await Promise.all([toBase64(aadhaarFile), toBase64(aadhaarBackFile), toBase64(panFile)]);
      const interest = form.interestType==="PAN INDIA"
        ? "PAN INDIA"
        : `${form.interestType}: ${form.interestDetail}`;
      await fetch(CONFIG.APPS_SCRIPT_URL,{
        method:"POST", mode:"no-cors",
        body:JSON.stringify({
          action:"saveProfile", uid:user.uid,
          dealershipName:form.dealershipName, mobile:form.mobile,
          address:`${form.address}, ${form.city}, ${form.state} - ${form.pinCode}`,
          city:form.city, state:form.state, pinCode:form.pinCode,
          interest, message:form.message,
          kycBase64:aadhaarB64,         kycFileName:aadhaarFile.name,     kycMimeType:aadhaarFile.type,
          kycBackBase64:aadhaarBackB64, kycBackFileName:aadhaarBackFile.name, kycBackMimeType:aadhaarBackFile.type,
          panBase64:panB64, panFileName:panFile.name, panMimeType:panFile.type,
        })
      });

      onComplete();

                <div>

                            border:`1.5px solid ${errors.city?"#fca5a5":"#E2E8F0"}`,
                            background:form.city?"#f0fdf4":"#fff",boxSizing:"border-box"}}/>
                  {errors.city&&<div style={{fontSize:"0.7rem",color:"#dc2626",marginTop:4}}>{errors.city}</div>}
                </div>
                <div>
                  <label style={{display:"block",fontSize:"0.75rem",fontWeight:600,color:"#0A1628",
                                 fontFamily:"'DM Sans',sans-serif",marginBottom:5}}>State *</label>
                  <input type="text" placeholder="Auto-filled" value={form.state}
                    onChange={e=>set("state",e.target.value)}
                    style={{width:"100%",padding:"11px 14px",borderRadius:10,outline:"none",
                            fontFamily:"'DM Sans',sans-serif",fontSize:"0.85rem",color:"#0A1628",
                            border:`1.5px solid ${errors.state?"#fca5a5":"#E2E8F0"}`,
                            background:form.state?"#f0fdf4":"#fff",boxSizing:"border-box"}}/>
                  {errors.state&&<div style={{fontSize:"0.7rem",color:"#dc2626",marginTop:4}}>{errors.state}</div>}
                </div>
              </div>

              {/* Interest */}
              <div style={{marginBottom:14}}>
                <label style={{display:"block",fontSize:"0.75rem",fontWeight:600,color:"#0A1628",
                               fontFamily:"'DM Sans',sans-serif",marginBottom:8}}>
                  Interested in dealing — Your Interest *
                </label>
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {["PAN INDIA","Specific State","Specific City"].map(opt=>(
                    <div key={opt}>
                      <label style={{display:"flex",alignItems:"center",gap:10,cursor:"pointer",
                                     padding:"10px 12px",borderRadius:9,
                                     border:`1.5px solid ${form.interestType===opt?"#1E3A8A":"#E2E8F0"}`,
                                     background:form.interestType===opt?"#EEF2FF":"#f8fafc"}}>
                        <input type="radio" name="interestType" value={opt}
                          checked={form.interestType===opt} onChange={()=>{set("interestType",opt);set("interestDetail","");}}
                          style={{accentColor:"#1E3A8A"}}/>
                        <span style={{fontFamily:"'DM Sans',sans-serif",fontSize:"0.82rem",
                                      color:"#0A1628",fontWeight:form.interestType===opt?600:400}}>
                          {opt==="PAN INDIA"?"🇮🇳 PAN INDIA — Any car, anywhere":
                           opt==="Specific State"?"📍 Specific State":
                           "🏙️ Specific City"}
                        </span>
                      </label>
                      {/* Detail input appears right below the selected option */}
                      {form.interestType===opt && opt!=="PAN INDIA" && (
                        <div style={{marginTop:6,paddingLeft:8}}>
                          <input type="text" autoFocus
                            placeholder={opt==="Specific State"?"e.g. Maharashtra, Delhi, Gujarat...":"e.g. Mumbai, Pune, Ahmedabad..."}
                            value={form.interestDetail} onChange={e=>set("interestDetail",e.target.value)}
                            style={{width:"100%",padding:"10px 14px",borderRadius:9,outline:"none",
                                    fontFamily:"'DM Sans',sans-serif",fontSize:"0.82rem",color:"#0A1628",
                                    border:`1.5px solid ${errors.interestDetail?"#fca5a5":"#BFDBFE"}`,
                                    background:"#EEF2FF",boxSizing:"border-box"}}/>
                          {errors.interestDetail&&(
                            <div style={{fontSize:"0.7rem",color:"#dc2626",marginTop:4,
                                         fontFamily:"'DM Sans',sans-serif"}}>{errors.interestDetail}</div>
                          )}
                        </div>
                      )}
                    </div>
                  ))}
                </div>
              </div>

              <button onClick={()=>{ if(validateStep1()) setStep(2); }}
                style={{width:"100%",padding:"13px",borderRadius:12,border:"none",cursor:"pointer",
                        background:"linear-gradient(135deg,#1E3A8A,#2563EB)",color:"#fff",
                        fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"0.9rem",
                        letterSpacing:"0.01em"}}>
                Next — Upload KYC →
              </button>
            </>
          )}

          {step===2 && (
            <>
              <button onClick={()=>setStep(1)}
                style={{display:"flex",alignItems:"center",gap:6,background:"none",border:"none",
                        cursor:"pointer",color:"#64748b",fontFamily:"'DM Sans',sans-serif",
                        fontSize:"0.78rem",marginBottom:14,padding:0}}>
                ← Back
              </button>
              <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"0.9rem",
                           color:"#0A1628",marginBottom:6}}>Upload KYC Document</div>
              <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:"0.75rem",color:"#64748b",
                           marginBottom:16}}>
                Aadhaar / PAN / GST Certificate / Dealer License — mandatory to proceed
              </div>

              {/* File upload area */}
              {/* ── Aadhaar Front Upload ── */}
              <KycUploadBox
                label="Aadhaar Card — Front Side *"
                file={aadhaarFile}
                error={errors.aadhaar}
                onCamera={handleAadhaar}
                onFile={handleAadhaar}
                onClear={()=>setAadhaarFile(null)}
              />
              {/* ── Aadhaar Back Upload ── */}
              <KycUploadBox
                label="Aadhaar Card — Back Side *"
                file={aadhaarBackFile}
                error={errors.aadhaarBack}
                onCamera={handleAadhaarBack}
                onFile={handleAadhaarBack}
                onClear={()=>setAadhaarBackFile(null)}
              />

              {/* ── PAN Card Upload ── */}
              <KycUploadBox
                label="PAN Card *"
                file={panFile}
                error={errors.pan}
                onCamera={handlePan}
                onFile={handlePan}
                onClear={()=>setPanFile(null)}
              />

              {/* ── Optional Message (after KYC) ── */}
              <div style={{marginBottom:14}}>
                <label style={{display:"block",fontSize:"0.75rem",fontWeight:600,color:"#0A1628",
                               fontFamily:"'DM Sans',sans-serif",marginBottom:5}}>
                  Anything you'd like to tell us? (optional)
                </label>
                <textarea placeholder="Years of experience, preferred brands, payment terms..."
                  value={form.message} onChange={e=>set("message",e.target.value)} rows={2}
                  style={{width:"100%",padding:"11px 14px",borderRadius:10,outline:"none",resize:"vertical",
                          fontFamily:"'DM Sans',sans-serif",fontSize:"0.82rem",color:"#0A1628",
                          border:"1px solid #E2E8F0",background:"#fff",boxSizing:"border-box"}}/>
              </div>

              <div style={{marginTop:10,padding:"10px 12px",background:"#FFF7ED",borderRadius:8,
                           border:"1px solid #FDE68A",fontFamily:"'DM Sans',sans-serif",
                           fontSize:"0.72rem",color:"#92400e",lineHeight:1.6}}>
                🔒 Your KYC is stored securely and only accessible to Suraksha24 admin team.
              </div>

              <button onClick={submit} disabled={loading}
                style={{width:"100%",marginTop:20,padding:"13px",borderRadius:12,border:"none",
                        cursor:loading?"not-allowed":"pointer",opacity:loading?0.7:1,
                        background:"linear-gradient(135deg,#1E3A8A,#2563EB)",color:"#fff",
                        fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"0.9rem",
                        display:"flex",alignItems:"center",justifyContent:"center",gap:10}}>
                {loading?(
                  <><div style={{width:18,height:18,border:"2px solid rgba(255,255,255,0.3)",
                                  borderTopColor:"#fff",borderRadius:"50%",
                                  animation:"spin 0.7s linear infinite"}}/>
                  Uploading KYC & Saving...</>
                ):"Complete Registration 🚀"}
              </button>

              <div style={{textAlign:"center",marginTop:12,fontFamily:"'DM Sans',sans-serif",
                           fontSize:"0.7rem",color:"#94a3b8",lineHeight:1.6}}>
                KYC is mandatory for compliance.<br/>You cannot access inventory without it.
              </div>
            </>
          )}
        </div>
      </div>
    </div>
  );
}

          onMouseLeave={e=>{e.currentTarget.style.boxShadow="0 2px 8px rgba(0,0,0,0.08)";e.currentTarget.style.borderColor="#E2E8F0";}}>
          {loading ? (
            <div style={{width:20,height:20,border:"2px solid #E2E8F0",borderTopColor:"#1E3A8A",
                          borderRadius:"50%",animation:"spin 0.7s linear infinite"}}/>
          ) : (
            <svg width="20" height="20" viewBox="0 0 48 48">
              <path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/>
              <path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/>
              <path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/>
              <path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/>
              <path fill="none" d="M0 0h48v48H0z"/>
            </svg>
          )}
          {loading ? "Signing in..." : "Continue with Google"}
        </button>

        <div style={{marginTop:20,padding:"12px",background:"#F8FAFF",borderRadius:10,
                     border:"1px solid #EEF2FF"}}>
          <div style={{fontFamily:"'DM Sans',sans-serif",fontSize:"0.72rem",color:"#64748b",
                       textAlign:"center",lineHeight:1.6}}>
            🔒 Secure sign-in powered by Google.<br/>
            Your data is safe and never shared.
          </div>
        </div>

        <div style={{marginTop:16,textAlign:"center",fontFamily:"'DM Sans',sans-serif",
                     fontSize:"0.68rem",color:"#94a3b8"}}>
          By signing in you agree to our Terms of Service
        </div>
      </div>

      {/* Badge */}
      <div style={{marginTop:24,display:"inline-flex",alignItems:"center",gap:6,
                   background:"rgba(212,175,55,0.12)",border:"1px solid rgba(212,175,55,0.3)",
                   borderRadius:30,padding:"4px 14px"}}>
        <div style={{width:6,height:6,borderRadius:"50%",background:"#D4AF37"}}/>
        <span style={{fontSize:"0.7rem",fontWeight:700,color:"#D4AF37",
                      letterSpacing:"0.1em",textTransform:"uppercase",
                      fontFamily:"'DM Sans',sans-serif"}}>Powered by CARS24</span>
      </div>
    </div>
  );
}

    { key:"home",
      label:tl("home"),

    },
    { key:"saved",
      label:tl("saved"), badge:savedCount,
      icon:(on)=><svg width="20" height="20" viewBox="0 0 24 24" fill={on?"#ef4444":"none"} stroke={on?"#ef4444":HI} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>

    { key:"contact",
      label:tl("contactUs"),
      icon:(on)=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={on?N:HI} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
    },
    { key:"feedback",
      label:"Feedback",
      icon:(on)=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={on?"#6366f1":HI} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/><line x1="9" y1="10" x2="15" y2="10"/><line x1="9" y1="14" x2="13" y2="14"/></svg>
    },
    { key:"getapps",
      label:"Get Apps",
      icon:(on)=><svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke={on?N:HI} strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><rect x="5" y="2" width="14" height="20" rx="2"/><line x1="12" y1="18" x2="12" y2="18" strokeWidth="3" strokeLinecap="round"/></svg>
    },
  ];
  return (
    <div style={{position:"fixed",bottom:0,left:0,right:0,zIndex:100,background:"#fff",
                 borderTop:`1px solid ${BR}`,display:"flex",padding:"6px 0 10px",

      {tabs.map(t=>{
        const on = view===t.key;
        return (
          <button key={t.key} onClick={()=>{ if(t.key==="home"&&view==="home"){ onRefresh&&onRefresh(); } else { setView(t.key); } }}
            style={{flex:1,display:"flex",flexDirection:"column",alignItems:"center",gap:3,
                    border:"none",background:"none",cursor:"pointer",padding:"4px 0",position:"relative"}}>

              <span style={{position:"absolute",top:0,right:"calc(50% - 16px)",background:"#ef4444",

                {t.badge}

function App() {
  const [cars,setCars]=useState([]);
  const [lang,setLang]=useState('en');
  const tl=(key)=>t(lang,key);
  const [user,setUser]=useState(null);
  const [authLoading,setAuthLoading]=useState(true);
  const [signInLoading,setSignInLoading]=useState(false);
  const [profileDone,setProfileDone]=useState(false);
  const [showHomeFeedback,setShowHomeFeedback]=useState(false);
  const [installModal,setInstallModal]=useState(null);

  const handleFeedbackSubmit = async (data) => {
    try {
      await fetch(CONFIG.APPS_SCRIPT_URL, {
        method:"POST", mode:"no-cors",
        body: JSON.stringify({
          action:"submitFeedback",
          name: data.name,
          mobile: data.mobile,
          rating: data.rating,
          feedback: data.feedback,
          timestamp: new Date().toISOString()
        })
      });
    } catch(e) {}
  };
  const [master,setMaster]=useState(SAMPLE_MASTER);
  const [loading,setLoading]=useState(true);
  const [searchTerm,setSearchTerm]=useState("");
  const [statusTab,setStatusTab]=useState("all");
  const [filters,setFilters]=useState({});
  const [saved,setSaved]=useState([]);
  const [view,setView]=useState("home");
  const [contactCar,setContactCar]=useState(null);
  const [bidCar,setBidCar]=useState(null);
  const [bidBundle,setBidBundle]=useState(null);
  const [toasts,setToasts]=useState([]);

  // Firebase Auth init
  useEffect(()=>{
    const auth = window.__fbAuth;
    if(!auth){ setAuthLoading(false); return; }
    const unsub = auth.onAuthStateChanged(async u=>{
      setUser(u);
      if(!u){ setAuthLoading(false); return; }

      // 1. Check localStorage first (fast)
      const localDone = localStorage.getItem(`s24_profile_${u.uid}`);
      if(localDone){
        setProfileDone(true);
        setAuthLoading(false);
      } else {
        // 2. Check Sheet — works across all devices/browsers
        try {
          const res  = await fetch(`${CONFIG.APPS_SCRIPT_URL}?action=getProfile&uid=${encodeURIComponent(u.uid)}`);
          const data = await res.json();
          if(data.profileComplete){
            localStorage.setItem(`s24_profile_${u.uid}`,"complete");
            setProfileDone(true);
          } else {
            setProfileDone(false);
          }
        } catch(e){
          setProfileDone(false);
        }
        setAuthLoading(false);
      }

      // 3. Record sign-in
      if(!CONFIG.APPS_SCRIPT_URL.includes("YOUR_")){
        fetch(CONFIG.APPS_SCRIPT_URL,{method:"POST",mode:"no-cors",
          body:JSON.stringify({action:"registerDealer",uid:u.uid,
            name:u.displayName,email:u.email,
            photo:u.photoURL,timestamp:new Date().toISOString()
          })
        }).catch(()=>{});
      }
    });
    return ()=>unsub();
  },[]);

  const handleGoogleSignIn = async () => {
    const auth = window.__fbAuth;
    if(!auth){ alert("Auth not ready — please refresh."); return; }
    setSignInLoading(true);
    try {
      const provider = new window.firebase.auth.GoogleAuthProvider();
      const result = await auth.signInWithPopup(provider);
      if(result?.user) setUser(result.user);
    } catch(e) {
      console.error("Sign in error:", e.code, e.message);
      if(e.code !== "auth/popup-closed-by-user"){
        alert("Sign-in failed: " + (e.code || e.message));
      }
      setSignInLoading(false);
    }
  };

  const handleSignOut = async () => {
    const auth = window.__fbAuth;
    if(!auth) return;
    await auth.signOut();
    setUser(null);
  };

  useEffect(()=>{
    if(!document.getElementById("s24-fonts")){
      const l=document.createElement("link");l.id="s24-fonts";l.rel="stylesheet";
      l.href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,600;0,700;1,400;1,500;1,600;1,700&family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,600;9..40,700;9..40,800&family=DM+Mono:wght@400;500&family=Syne:wght@700;800;900&display=swap";
      document.head.appendChild(l);
    }
    document.body.style.cssText="margin:0;padding:0;background:#F8FAFF;font-family:'DM Sans',sans-serif;";
  },[]);



  const fetchCars = useCallback(async (silent=false) => {
    if(CONFIG.DEMO_MODE||!CONFIG.APPS_SCRIPT_URL||CONFIG.APPS_SCRIPT_URL.includes("YOUR_")){
      setCars(SAMPLE_CARS);setMaster(SAMPLE_MASTER);setLoading(false);return;
    }
    if(!silent) setLoading(true);
    try{
      const res=await fetch(`${CONFIG.APPS_SCRIPT_URL}?action=getData&t=${Date.now()}`,{cache:"no-store"});
      const d=await res.json();
      if(d.cars?.length)setCars(d.cars);else if(!silent)setCars(SAMPLE_CARS);
      if(d.master)setMaster({...SAMPLE_MASTER,...d.master});
    }catch(e){ if(!silent){setCars(SAMPLE_CARS);setMaster(SAMPLE_MASTER);} }
    finally{ setLoading(false); }
  },[]);

  useEffect(()=>{ fetchCars(); },[]);

  const addToast=useCallback((message,type="info")=>{const id=Date.now();setToasts(t=>[...t,{id,message,type}]);setTimeout(()=>setToasts(t=>t.filter(x=>x.id!==id)),4000);},[]);
  const removeToast=useCallback((id)=>setToasts(t=>t.filter(x=>x.id!==id)),[]);
  const toggleSave=useCallback((id)=>setSaved(s=>s.includes(id)?s.filter(x=>x!==id):[...s,id]),[]);

  const filtered=useMemo(()=>{
    let out=cars;
    if(statusTab!=="all")out=out.filter(c=>(c.status||"").toLowerCase()===statusTab);
    if(searchTerm){const q=searchTerm.toLowerCase();out=out.filter(c=>[c.make,c.model,c.variant,c.regNo,c.state,c.bank,c.parkingYard,c.fuelType,c.rcStatus].some(v=>(v||"").toLowerCase().includes(q)));}
    Object.entries(filters).forEach(([k,vals])=>{if(vals.length)out=out.filter(c=>vals.includes(c[k]));});
    return out;
  },[cars,statusTab,searchTerm,filters]);

  const counts=useMemo(()=>({
    all:          cars.length,
    "for sale":   cars.filter(c=>c.status?.toLowerCase()==="for sale").length,
    "upcoming":   cars.filter(c=>c.status?.toLowerCase()==="upcoming").length,
    "bulk deals": cars.filter(c=>c.status?.toLowerCase()==="bulk deals").length,
    "disputed":   cars.filter(c=>c.status?.toLowerCase()==="disputed").length,
    "blacklisted":cars.filter(c=>c.status?.toLowerCase()==="blacklisted").length,
    "total loss":  cars.filter(c=>c.status?.toLowerCase()==="total loss").length,
  }),[cars]);

  const sorted=useMemo(()=>[...filtered].sort((a,b)=>(b.featured?1:0)-(a.featured?1:0)),[filtered]);

  const handleContact=useCallback(async(formData)=>{
    try{
      if(!CONFIG.DEMO_MODE&&!CONFIG.APPS_SCRIPT_URL.includes("YOUR_"))
        await fetch(CONFIG.APPS_SCRIPT_URL,{method:"POST",mode:"no-cors",body:JSON.stringify({action:"submitEnquiry",...formData})});
      setCars(prev=>prev.map(c=>c.id===formData.carId?{...c,enquiryTotal:(c.enquiryTotal||0)+1}:c));
      addToast("Enquiry submitted! Our agent will contact you shortly.","success");
    }catch(e){addToast("Submitted! We'll get back to you soon.","success");}
  },[addToast]);

  const handleBid=useCallback(async(formData)=>{
    try{
      if(!CONFIG.DEMO_MODE&&!CONFIG.APPS_SCRIPT_URL.includes("YOUR_"))
        await fetch(CONFIG.APPS_SCRIPT_URL,{method:"POST",mode:"no-cors",body:JSON.stringify({action:"submitDealerResponse",...formData,dealId:formData.dealId||""})});
      setCars(prev=>prev.map(c=>c.id===formData.carId?{...c,bidTotal:(c.bidTotal||0)+1}:c));
      addToast(`Bid of ₹${Number(formData.bidPrice).toLocaleString("en-IN")} submitted!`,"success");
    }catch(e){addToast("Bid submitted! Our team will review it.","success");}
  },[addToast]);

  // Bundle grouping for Bulk Deals tab
  const renderCards = () => {
    if (statusTab === "bulk deals") {
      const bundled = {};
      const standalone = [];
      sorted.forEach(c => {
        if (c.dealId) {
          if (!bundled[c.dealId]) bundled[c.dealId] = [];
          bundled[c.dealId].push(c);
        } else {
          standalone.push(c);
        }
      });
      return [
        ...Object.entries(bundled).map(([did, bCars]) => (
          <BundleCard key={did} dealId={did} cars={bCars}
            onBid={(c, d, bc) => { setBidCar(c); setBidBundle({dealId:d, cars:bc}); }}
            onContact={(c, d, bc) => { setContactCar(c); setBidBundle(null); }}/>
        )),
        ...standalone.map(c => (
          <CarCard key={c.id} car={c} onContact={setContactCar} onBid={setBidCar}
            saved={saved.includes(c.id)} toggleSave={toggleSave} tl={tl}/>
        )),
      ];
    }
    return sorted.map(c => (
      <CarCard key={c.id} car={c} onContact={setContactCar} onBid={setBidCar}
        saved={saved.includes(c.id)} toggleSave={toggleSave} tl={tl}/>
    ));
  };

    // Pre-fill dealer name from Google account
  const dealerDisplayName = user?.displayName || "";
  const dealerEmail = user?.email || "";

  if(authLoading) return (
    <div style={{minHeight:"100vh",background:"linear-gradient(160deg,#060B27,#0A2463)",
                 display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:16}}>
      <div style={{width:40,height:40,border:"3px solid rgba(212,175,55,0.3)",borderTopColor:"#D4AF37",
                   borderRadius:"50%",animation:"spin 0.7s linear infinite"}}/>
      <p style={{color:"rgba(255,255,255,0.5)",fontSize:"0.8rem",fontFamily:"'DM Sans',sans-serif"}}>Loading Suraksha24...</p>
      <style>{`@keyframes spin{to{transform:rotate(360deg)}}`}</style>
    </div>
  );

  if(!user) return <AuthScreen onSignIn={handleGoogleSignIn} loading={signInLoading}/>;
  if(!profileDone) return <ProfileForm user={user} onComplete={()=>setProfileDone(true)}/>;

  return (
    <div style={{minHeight:"100vh",background:BG,paddingBottom:72,width:"100%",overflowX:"hidden"}}>
      <Header lang={lang} setLang={setLang} tl={tl} user={user} onSignOut={handleSignOut} onHome={()=>{
        setView("home");
        setStatusTab("all");
        setFilters({});
        setSearchTerm("");
        fetchCars(true);
      }}/>
      <div style={{paddingTop:62}}>
        {view==="home"&&(
          <>
            <HeroBanner tl={tl} searchTerm={searchTerm} setSearchTerm={setSearchTerm}/>
            <StatusTabs active={statusTab} onChange={setStatusTab} counts={counts} tl={tl}/>
            <FilterChips master={master} filters={filters} setFilters={setFilters} tl={tl}/>
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"10px 14px 6px"}}>
              <span style={{fontSize:"0.78rem",fontWeight:600,color:MT}}>
                {loading?tl("loading"):`${sorted.length} ${tl("carsFound")}`}
              </span>
              {Object.values(filters).flat().length>0&&(
                <button onClick={()=>setFilters({})} style={{fontSize:"0.72rem",color:N,fontWeight:600,background:"none",border:"none",cursor:"pointer"}}>{tl("clearFilters")}</button>
              )}
            </div>
            <div style={{padding:"0 14px",display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(420px,1fr))",gap:12}}>
              {loading?Array(6).fill(0).map((_,i)=>(
                <div key={i} style={{background:"#fff",borderRadius:14,height:130,
                  border:`1px solid ${BR}`,overflow:"hidden",display:"flex",gap:0}}>
                  <div style={{width:110,background:"#E2E8F0",flexShrink:0,
                    animation:"pulse 1.4s ease-in-out infinite",animationDelay:`${i*0.1}s`}}/>
                  <div style={{flex:1,padding:"14px 12px",display:"flex",flexDirection:"column",gap:8}}>
                    <div style={{height:14,background:"#E2E8F0",borderRadius:6,width:"60%",
                      animation:"pulse 1.4s ease-in-out infinite",animationDelay:`${i*0.1+0.1}s`}}/>
                    <div style={{height:10,background:"#F1F5F9",borderRadius:6,width:"40%",
                      animation:"pulse 1.4s ease-in-out infinite",animationDelay:`${i*0.1+0.2}s`}}/>
                    <div style={{height:10,background:"#F1F5F9",borderRadius:6,width:"80%",
                      animation:"pulse 1.4s ease-in-out infinite",animationDelay:`${i*0.1+0.3}s`}}/>
                    <div style={{height:18,background:"#DBEAFE",borderRadius:6,width:"35%",marginTop:4,
                      animation:"pulse 1.4s ease-in-out infinite",animationDelay:`${i*0.1+0.4}s`}}/>
                  </div>
                </div>
              )):sorted.length===0?(
                <div style={{textAlign:"center",padding:"48px 20px"}}>
                  <Car size={48} style={{color:BR,margin:"0 auto 12px"}}/>
                  <div style={{color:MT,fontSize:"0.9rem",fontWeight:600}}>{tl("noCarFound")}</div>
                  <div style={{color:HI,fontSize:"0.78rem",marginTop:6}}>{tl("adjustFilters")}</div>
                </div>
              ):renderCards()}

            </div>
          </>
        )}
        {view==="saved"&&<SavedCars cars={cars} savedIds={saved} onContact={setContactCar} onBid={setBidCar} toggleSave={toggleSave} tl={tl}/>}
        {view==="contact"&&<ContactPage tl={tl}/>}
        {view==="feedback"&&<FeedbackModal onClose={()=>setView("home")} onSubmit={handleFeedbackSubmit}/>}
        {view==="getapps"&&<GetAppsPage tl={tl} onInstall={(type)=>setInstallModal(type)}/>}
      </div>

      <BottomNav view={view} setView={setView} savedCount={saved.length} tl={tl} onRefresh={()=>{
        setView("home");
        setStatusTab("all");
        setFilters({});
        setSearchTerm("");
        fetchCars(true);
      }}/>

      {installModal&&(
        <div onClick={()=>setInstallModal(null)}
          style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:600,
                  display:"flex",alignItems:"center",justifyContent:"center",padding:"16px"}}>
          <InstallInstructions type={installModal} onClose={()=>setInstallModal(null)}/>
        </div>
      )}
      {showHomeFeedback&&<FeedbackModal onClose={()=>setShowHomeFeedback(false)} onSubmit={async(data)=>{await fetch(CONFIG.APPS_SCRIPT_URL,{method:"POST",mode:"no-cors",body:JSON.stringify({action:"submitFeedback",...data,timestamp:new Date().toISOString()})}).catch(()=>{});}}/>}
      {contactCar&&<ContactModal car={contactCar} onClose={()=>setContactCar(null)} onSubmit={handleContact} tl={tl}/>}
      {bidCar&&<BidModal car={{...bidCar,_prefillName:user?.displayName||""}} bundle={bidBundle} onClose={()=>{setBidCar(null);setBidBundle(null);}} onSubmit={handleBid} tl={tl}/>}

      <Toast toasts={toasts} remove={removeToast}/>

      <style>{`@keyframes pulse{0%,100%{opacity:1}50%{opacity:0.5}}@keyframes spin{to{transform:rotate(360deg)}}*{box-sizing:border-box}::-webkit-scrollbar{height:3px;width:4px}::-webkit-scrollbar-thumb{background:#BFDBFE;border-radius:4px}input::placeholder,textarea::placeholder{color:#94a3b8}`}</style>
    </div>
  );
}

document.getElementById('loader').style.display='none';
ReactDOM.render(React.createElement(App),document.getElementById('root'));
  </script>

  <script>
    if("serviceWorker" in navigator){
      window.addEventListener("load",()=>{
        navigator.serviceWorker.register("/sw.js")
          .then(()=>console.log("SW registered"))
          .catch(e=>console.log("SW error:",e));
      });
    }
  </script>
</body>
</html>
