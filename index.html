const formatCurrency = (n) => {
  if (!n) return "₹0";
  if (n >= 10000000) return `₹${(n / 10000000).toFixed(2)} Cr`;
  if (n >= 100000)   return `₹${(n / 100000).toFixed(2)} L`;
  if (n >= 1000)     return `₹${(n / 1000).toFixed(0)}K`;
  return `₹${n.toLocaleString("en-IN")}`;
};

const fmtNum = (n) => (n || 0).toLocaleString("en-IN");

  "auction live": { pill: "bg-amber-100 text-amber-700 border-amber-200 dark:bg-amber-900/30 dark:text-amber-400 dark:border-amber-800",   dot: "bg-amber-500 animate-pulse" },
  sold:         { pill: "bg-red-100 text-red-700 border-red-200 dark:bg-red-900/30 dark:text-red-400 dark:border-red-800",           dot: "bg-red-500" },
};

const getStatusCfg = (s) => statusCfg[(s || "").toLowerCase()] || statusCfg["sold"];

// custom hook
function useScrolled() {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const fn = () => setScrolled(window.scrollY > 10);
    window.addEventListener("scroll", fn, { passive: true });
    return () => window.removeEventListener("scroll", fn);
  }, []);
  return scrolled;
}

function Badge({ status }) {
  const cfg = getStatusCfg(status);
  return (
    <span className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-semibold border ${cfg.pill}`}>
      <span className={`w-1.5 h-1.5 rounded-full ${cfg.dot}`} />
      {status}
    </span>
  );
}

function Toast({ toasts, remove }) {
  return (
    <div className="fixed top-4 right-4 z-[9999] flex flex-col gap-2 pointer-events-none">
      {toasts.map(t => (
        <div key={t.id}
          className={`pointer-events-auto flex items-center gap-3 px-4 py-3 rounded-2xl shadow-2xl text-white text-sm font-medium min-w-72 transition-all
            ${t.type === "success" ? "bg-emerald-600" : t.type === "error" ? "bg-red-600" : "bg-blue-600"}`}>
          {t.type === "success" ? <CheckCircle size={15}/> : t.type === "error" ? <AlertCircle size={15}/> : <Bell size={15}/>}
          <span className="flex-1">{t.message}</span>
          <button className="opacity-70 hover:opacity-100" onClick={() => remove(t.id)}><X size={13}/></button>
        </div>
      ))}
    </div>
  );
}

function Skeleton({ dark }) {

function Logo({ dark, size = "md" }) {
  const big = size === "lg";
  const h = big ? 52 : 38;
  return (
    <div style={{
      display: "inline-block",
      background: dark ? "rgba(255,255,255,0.92)" : "transparent",
      borderRadius: dark ? 8 : 0,
      padding: dark ? "3px 8px" : 0,
      lineHeight: 0,
    }}>
      <img
        src={LOGO_SRC}
        alt="Suraksha24 — Repo Cars by LOANS24"
        height={h}
        style={{ height: h, width: "auto", maxWidth: big ? 240 : 180, objectFit: "contain", display: "block" }}
      />
    </div>
  );
}

// ============================================================
// 🔽  MULTI-SELECT DROPDOWN
// ============================================================
function MultiSelect({ label, options, selected, onChange, dark, Icon }) {
  const [open, setOpen] = useState(false);
  const ref = useRef(null);

  useEffect(() => {
    const fn = (e) => { if (ref.current && !ref.current.contains(e.target)) setOpen(false); };
    document.addEventListener("mousedown", fn);
    return () => document.removeEventListener("mousedown", fn);
  }, []);

  const toggle = (o) => onChange(selected.includes(o) ? selected.filter(s => s !== o) : [...selected, o]);
  const active = selected.length > 0;

  return (
    <div className="relative" ref={ref}>
      <button onClick={() => setOpen(!open)}
        className={`w-full flex items-center justify-between gap-2 px-3 py-2.5 rounded-xl border text-sm font-medium transition-all
          ${dark ? "bg-slate-700/80 border-slate-600 text-slate-200 hover:border-blue-500" : "bg-white border-slate-200 text-slate-700 hover:border-blue-400"}
          ${active ? "border-blue-500 ring-2 ring-blue-500/15" : ""}`}>
        <div className="flex items-center gap-2 min-w-0">
          {Icon && <Icon size={13} className="text-blue-500 flex-shrink-0" />}
          <span className="truncate text-xs">{active ? `${label} (${selected.length})` : label}</span>
        </div>
        <ChevronDown size={13} className={`flex-shrink-0 transition-transform duration-200 ${open ? "rotate-180" : ""}`} />
      </button>

      {open && (
        <div className={`absolute top-full mt-1.5 left-0 right-0 z-30 rounded-2xl shadow-2xl border overflow-hidden
          ${dark ? "bg-slate-800 border-slate-700" : "bg-white border-slate-200"}`}
          style={{ minWidth: "160px" }}>
          <div className="max-h-52 overflow-y-auto p-1.5">
            {options.length === 0
              ? <p className={`px-3 py-2 text-xs ${dark ? "text-slate-500" : "text-slate-400"}`}>No options available</p>
              : options.map(o => (
                <button key={o} onClick={() => toggle(o)}
                  className={`w-full flex items-center gap-2.5 px-3 py-2 rounded-xl text-xs text-left transition-colors
                    ${selected.includes(o)
                      ? dark ? "bg-blue-600/20 text-blue-300" : "bg-blue-50 text-blue-700"
                      : dark ? "hover:bg-slate-700 text-slate-300" : "hover:bg-slate-50 text-slate-600"}`}>
                  <span className={`w-4 h-4 rounded-md border flex items-center justify-center flex-shrink-0
                    ${selected.includes(o) ? "bg-blue-600 border-blue-600" : dark ? "border-slate-600" : "border-slate-300"}`}>
                    {selected.includes(o) && <Check size={9} className="text-white" />}
                  </span>
                  {o}
                </button>
              ))}
          </div>
          {active && (
            <div className={`border-t px-3 py-1.5 ${dark ? "border-slate-700" : "border-slate-100"}`}>
              <button onClick={() => onChange([])} className="text-xs text-red-500 hover:text-red-600 font-semibold">Clear</button>
            </div>
          )}
        </div>
      )}
    </div>
  );
}

function Header({ dark, toggleDark, view, setView, carsCount }) {
  const [mobileOpen, setMobileOpen] = useState(false);
  const scrolled = useScrolled();

  return (
    <header className={`fixed inset-x-0 top-0 z-40 transition-all duration-300
      ${CONFIG.DEMO_MODE ? "top-8" : "top-0"}
      ${scrolled
        ? dark ? "bg-slate-900/95 backdrop-blur-xl shadow-xl shadow-black/30" : "bg-white/95 backdrop-blur-xl shadow-lg shadow-slate-200/80"
        : dark ? "bg-slate-900" : "bg-white"}`}>
      <div className="max-w-7xl mx-auto px-4 sm:px-6">
        <div className="flex items-center justify-between h-16">
          <button onClick={() => setView("home")} className="focus:outline-none">
            <Logo dark={dark} />
          </button>

          {/* Desktop nav */}
          <nav className="hidden md:flex items-center gap-1">
            {[["home","Inventory"],["dashboard","Dashboard"]].map(([v, label]) => (
              <button key={v} onClick={() => setView(v)}
                className={`px-4 py-2 rounded-xl text-sm font-medium transition-colors
                  ${view === v
                    ? dark ? "bg-blue-600/20 text-blue-400" : "bg-blue-50 text-blue-600"
                    : dark ? "text-slate-400 hover:text-white hover:bg-slate-800" : "text-slate-600 hover:text-slate-900 hover:bg-slate-100"}`}>
                {label}{v === "home" && !CONFIG.DEMO_MODE && <span className="ml-1.5 text-xs opacity-60">({carsCount})</span>}
              </button>
            ))}
            <a href={`https://wa.me/${CONFIG.WHATSAPP_NUMBER}`} target="_blank" rel="noopener noreferrer"
               className="ml-2 flex items-center gap-1.5 px-4 py-2 bg-green-500 hover:bg-green-600 text-white rounded-xl text-sm font-semibold transition-colors">
              <MessageCircle size={14}/> WhatsApp

            <a href={`tel:${CONFIG.CALL_NUMBER}`}
               className="flex items-center gap-1.5 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-sm font-semibold transition-colors">
              <Phone size={14}/> Call Now
            </a>
            <button onClick={toggleDark}
              className={`ml-1 p-2 rounded-xl transition-colors ${dark ? "text-slate-400 hover:text-white hover:bg-slate-800" : "text-slate-500 hover:text-slate-900 hover:bg-slate-100"}`}>
              {dark ? <Sun size={17}/> : <Moon size={17}/>}

          {/* Mobile */}
          <div className="flex md:hidden items-center gap-1.5">

              {dark ? <Sun size={16}/> : <Moon size={16}/>}

            <button onClick={() => setMobileOpen(o => !o)} className={`p-2 rounded-xl transition-colors ${dark ? "text-white hover:bg-slate-800" : "text-slate-900 hover:bg-slate-100"}`}>
              {mobileOpen ? <X size={20}/> : <Menu size={20}/>}
            </button>
          </div>
        </div>

        {/* Mobile drawer */}
        {mobileOpen && (
          <div className={`md:hidden pb-4 border-t ${dark ? "border-slate-800" : "border-slate-100"}`}>
            <div className="pt-3 space-y-1">
              {[["home","Inventory"],["dashboard","My Dashboard"]].map(([v, label]) => (
                <button key={v} onClick={() => { setView(v); setMobileOpen(false); }}
                  className={`w-full text-left px-3 py-2.5 rounded-xl text-sm font-medium transition-colors
                    ${view === v ? dark ? "bg-blue-600/20 text-blue-400" : "bg-blue-50 text-blue-600"
                                : dark ? "text-slate-300 hover:bg-slate-800" : "text-slate-700 hover:bg-slate-100"}`}>
                  {label}
                </button>
              ))}

// 🗂️  CAR GRID + PAGINATION

function CarGrid({ cars, dark, loading, onContact, onDealer, savedCars, toggleSave }) {
  const PER_PAGE = 9;
  const [page, setPage] = useState(1);
  const total = Math.ceil(cars.length / PER_PAGE);
  const visible = cars.slice((page - 1) * PER_PAGE, page * PER_PAGE);

  useEffect(() => setPage(1), [cars.length]);

  if (loading) return (
    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
      {Array(6).fill(0).map((_, i) => <Skeleton key={i} dark={dark}/>)}
    </div>
  );

  if (!cars.length) return (
    <div className={`text-center py-20 rounded-2xl border ${dark ? "bg-slate-800 border-slate-700" : "bg-white border-slate-200"}`}>
      <Car size={48} className={`mx-auto mb-4 ${dark ? "text-slate-700" : "text-slate-200"}`}/>
      <h3 className={`text-lg font-bold mb-1 ${dark ? "text-white" : "text-slate-900"}`}>No Cars Found</h3>
      <p className={`text-sm ${dark ? "text-slate-500" : "text-slate-400"}`}>Try adjusting your filters or search term</p>
    </div>
  );

  return (
    <>
      <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-5">
        {visible.map(car => (
          <CarCard key={car.id} car={car} dark={dark} onContact={onContact} onDealer={onDealer}
                   saved={savedCars.includes(car.id)} toggleSave={toggleSave}/>
        ))}
      </div>

      {total > 1 && (
        <div className="flex items-center justify-center gap-2 mt-8">
          <PgBtn onClick={() => setPage(p => Math.max(1, p-1))} disabled={page === 1} dark={dark}><ChevronLeft size={15}/></PgBtn>
          {Array.from({ length: total }, (_, i) => i + 1)
            .filter(p => p === 1 || p === total || Math.abs(p - page) <= 1)
            .reduce((acc, p, i, arr) => {
              if (i > 0 && arr[i-1] !== p - 1) acc.push("…");
              acc.push(p);
              return acc;
            }, [])
            .map((p, i) =>
              p === "…"
                ? <span key={`e${i}`} className={`text-sm ${dark ? "text-slate-500" : "text-slate-400"}`}>…</span>
                : <PgBtn key={p} onClick={() => setPage(p)} active={page === p} dark={dark}>{p}</PgBtn>
            )}
          <PgBtn onClick={() => setPage(p => Math.min(total, p+1))} disabled={page === total} dark={dark}><ChevronRight size={15}/></PgBtn>
        </div>
      )}
    </>
  );
}

function PgBtn({ children, onClick, disabled, active, dark }) {
  return (
    <button onClick={onClick} disabled={disabled}
      className={`min-w-9 h-9 px-2.5 rounded-xl text-sm font-semibold transition-colors border disabled:opacity-40 disabled:cursor-not-allowed
        ${active ? "bg-blue-600 border-blue-600 text-white" : dark ? "border-slate-700 text-slate-300 hover:bg-slate-800" : "border-slate-200 text-slate-700 hover:bg-slate-50"}`}>
      {children}
    </button>
  );
}

      <div className="absolute inset-0 bg-black/60 backdrop-blur-sm" onClick={onClose}/>

function ContactModal({ car, dark, onClose, onSubmit }) {
  const [form, setForm] = useState({ name:"", mobile:"", message:"", agent:"" });
  const [err, setErr] = useState({});
  const [loading, setLoading] = useState(false);
  const [done, setDone] = useState(false);

  const validate = () => {
    const e = {};
    if (!form.name.trim()) e.name = "Name is required";
    if (!/^\d{10}$/.test(form.mobile)) e.mobile = "Enter valid 10-digit mobile";
    if (!form.agent) e.agent = "Please select an agent";
    return e;
  };

  const submit = async () => {
    const e = validate();
    if (Object.keys(e).length) { setErr(e); return; }
    setLoading(true);
    await onSubmit({ ...form, carId: car.id, regNo: car.regNo, carName: `${car.regYear} ${car.make} ${car.model}` });
    setDone(true);
    setLoading(false);
  };

  if (done) return (
    <Modal dark={dark} onClose={onClose} title="">
      <div className="text-center py-8">
        <div className="w-16 h-16 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-4">
          <CheckCircle size={30} className="text-emerald-600"/>
        </div>
        <h3 className={`text-xl font-bold mb-2 ${dark ? "text-white" : "text-slate-900"}`}>Enquiry Submitted!</h3>
        <p className={`text-sm mb-1 ${dark ? "text-slate-400" : "text-slate-600"}`}>
          Agent <strong>{form.agent}</strong> will contact you shortly.
        </p>
        <p className={`text-xs mb-6 ${dark ? "text-slate-500" : "text-slate-400"}`}>
          Regarding: {car.regYear} {car.make} {car.model} ({car.regNo})
        </p>
        <button onClick={onClose} className="px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-semibold">Done</button>
      </div>
    </Modal>
  );

  return (
    <Modal dark={dark} onClose={onClose} title="Contact Us">
      {/* Car summary */}

function DealerModal({ car, dark, onClose, onSubmit }) {
  const [form, setForm] = useState({ name:"", mobile:"", inspectionRequired:"Yes", offerPrice:"", negotiationAmount:"", remarks:"" });
  const [err, setErr] = useState({});
  const [loading, setLoading] = useState(false);
  const [done, setDone] = useState(false);

  const validate = () => {
    const e = {};
    if (!form.name.trim()) e.name = "Dealer name required";
    if (!/^\d{10}$/.test(form.mobile)) e.mobile = "Valid 10-digit mobile required";
    if (!form.offerPrice || isNaN(Number(form.offerPrice)) || Number(form.offerPrice) <= 0) e.offerPrice = "Valid offer price required";
    return e;
  };

  const submit = async () => {
    const e = validate();
    if (Object.keys(e).length) { setErr(e); return; }
    setLoading(true);
    await onSubmit({ ...form, carId: car.id, regNo: car.regNo });
    setDone(true);
    setLoading(false);
  };

  if (done) return (
    <Modal dark={dark} onClose={onClose} title="">
      <div className="text-center py-8">
        <div className="w-16 h-16 bg-amber-100 rounded-full flex items-center justify-center mx-auto mb-4">
          <CheckCircle size={30} className="text-amber-600"/>
        </div>
        <h3 className={`text-xl font-bold mb-2 ${dark ? "text-white" : "text-slate-900"}`}>Offer Submitted!</h3>
        <p className={`text-sm mb-1 ${dark ? "text-slate-400" : "text-slate-600"}`}>
          Offer of <strong>{formatCurrency(Number(form.offerPrice))}</strong> recorded for
        </p>
        <p className={`text-sm font-bold mb-1 ${dark ? "text-white" : "text-slate-900"}`}>{car.make} {car.model} — {car.regNo}</p>
        <p className={`text-xs mb-6 ${dark ? "text-slate-500" : "text-slate-400"}`}>
          Inspection: {form.inspectionRequired} · Our team will reach out shortly.
        </p>
        <button onClick={onClose} className="px-6 py-2.5 bg-amber-500 hover:bg-amber-600 text-white rounded-xl font-semibold">Done</button>
      </div>
    </Modal>
  );

  return (
    <Modal dark={dark} onClose={onClose} title="Dealer Offer">
      <div className={`rounded-xl p-3 mb-5 flex items-center gap-3 ${dark ? "bg-amber-900/20 border border-amber-900/30" : "bg-amber-50 border border-amber-100"}`}>
        <Wrench size={18} className="text-amber-500 flex-shrink-0"/>
        <div className="flex-1">
          <p className={`font-bold text-sm ${dark ? "text-white" : "text-slate-900"}`}>{car.regYear} {car.make} {car.model}</p>
          <p className={`text-xs ${dark ? "text-slate-400" : "text-slate-500"}`}>Highest Bid: {formatCurrency(car.highestBid)}</p>
        </div>
      </div>

      <div className="space-y-4">
        <div className="grid grid-cols-2 gap-3">
          <Field label="Dealer Name *" error={err.name}>
            <input placeholder="Your name" value={form.name}
              onChange={e => { setForm(f => ({...f, name:e.target.value})); setErr(er => ({...er, name:""})); }}
              className={inp(dark, err.name)}/>
          </Field>
          <Field label="Mobile *" error={err.mobile}>
            <input placeholder="10-digit mobile" value={form.mobile} maxLength={10}
              onChange={e => { setForm(f => ({...f, mobile:e.target.value})); setErr(er => ({...er, mobile:""})); }}
              className={inp(dark, err.mobile)}/>
          </Field>
        </div>

        <Field label="Physical Inspection Required?">
          <div className="flex gap-3">
            {["Yes","No"].map(o => (
              <button key={o} onClick={() => setForm(f => ({...f, inspectionRequired:o}))}
                className={`flex-1 py-2.5 rounded-xl text-sm font-bold border transition-all
                  ${form.inspectionRequired === o
                    ? o === "Yes" ? "bg-emerald-600 border-emerald-600 text-white" : "bg-red-500 border-red-500 text-white"
                    : dark ? "bg-slate-700 border-slate-600 text-slate-300" : "bg-slate-100 border-slate-200 text-slate-600"}`}>

              onChange={e => setForm(f => ({...f, negotiationAmount:e.target.value}))}
              className={inp(dark)}/>

            onChange={e => setForm(f => ({...f, remarks:e.target.value}))}

function App() {
  const [dark, setDark]       = useState(false);
  const [view, setView]       = useState("home");
  const [cars, setCars]       = useState([]);
  const [master, setMaster]   = useState({ banks:[], zones:[], states:[], cities:[], makes:[], models:[] });
  const [loading, setLoading] = useState(true);
  const [error, setError]     = useState(null);
  const [search, setSearch]   = useState("");
  const [sort, setSort]       = useState("newest");
  const [featured, setFeatured] = useState(false);
  const [filters, setFilters] = useState({ banks:[], zones:[], states:[], cities:[], makes:[], models:[], fuelTypes:[], statuses:[], budget:"" });
  const [savedCars, setSaved] = useState([]);
  const [contactCar, setContactCar] = useState(null);
  const [dealerCar, setDealerCar]   = useState(null);
  const [toasts, setToasts]   = useState([]);

  // Load Google Fonts
  useEffect(() => {
    if (!document.getElementById("gfonts-suraksha")) {
      const link = document.createElement("link");
      link.id = "gfonts-suraksha";
      link.href = "https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;900&family=Syne:wght@400;500;600;700;800;900&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap";
      link.rel = "stylesheet";
      document.head.appendChild(link);
    }
    document.body.style.fontFamily = "'Plus Jakarta Sans', system-ui, sans-serif";
  }, []);

  // Fetch data
  useEffect(() => {
    (async () => {
      setLoading(true); setError(null);
      if (CONFIG.DEMO_MODE || CONFIG.APPS_SCRIPT_URL === "YOUR_GOOGLE_APPS_SCRIPT_URL_HERE") {
        await new Promise(r => setTimeout(r, 1100));
        setCars(SAMPLE_CARS);
        setMaster(SAMPLE_MASTER);
      } else {
        try {
          const res = await fetch(`${CONFIG.APPS_SCRIPT_URL}?action=getData`);
          const data = await res.json();
          if (data.status === "success") {
            setCars(data.cars || []);
            setMaster({ banks: data.banks||[], zones: data.zones||[], states: data.states||[], cities: data.cities||[], makes: data.makes||[], models: data.models||[] });
          } else throw new Error(data.message);
        } catch (e) {
          setError(e.message);
          addToast("Failed to load live data — showing demo inventory", "error");
          setCars(SAMPLE_CARS); setMaster(SAMPLE_MASTER);
        }
      }
      setLoading(false);
    })();
  }, []);

  const addToast = useCallback((message, type = "info") => {
    const id = Date.now() + Math.random();
    setToasts(t => [...t, { id, message, type }]);
    setTimeout(() => setToasts(t => t.filter(x => x.id !== id)), 4200);
  }, []);

  const removeToast = useCallback((id) => setToasts(t => t.filter(x => x.id !== id)), []);
  const toggleSave = useCallback((id) => setSaved(s => s.includes(id) ? s.filter(x => x !== id) : [...s, id]), []);

  const handleContactSubmit = async (data) => {
    if (!CONFIG.DEMO_MODE && CONFIG.APPS_SCRIPT_URL !== "YOUR_GOOGLE_APPS_SCRIPT_URL_HERE") {
      try {
        await fetch(CONFIG.APPS_SCRIPT_URL, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ action:"submitEnquiry", data }) });
      } catch (_) {}
    }
    setCars(prev => prev.map(c => c.id === data.carId ? { ...c, contactCount: (c.contactCount||0) + 1 } : c));
    addToast("Enquiry submitted successfully!", "success");
  };

  const handleDealerSubmit = async (data) => {
    if (!CONFIG.DEMO_MODE && CONFIG.APPS_SCRIPT_URL !== "YOUR_GOOGLE_APPS_SCRIPT_URL_HERE") {
      try {
        await fetch(CONFIG.APPS_SCRIPT_URL, { method:"POST", headers:{"Content-Type":"application/json"}, body: JSON.stringify({ action:"submitDealerResponse", data }) });
      } catch (_) {}
    }
    setCars(prev => prev.map(c => c.id === data.carId ? { ...c, dealerCount: (c.dealerCount||0) + 1 } : c));
    addToast("Dealer offer submitted!", "success");
  };

  // Filter & sort
  const filtered = useMemo(() => {
    let r = cars;
    if (search) {
      const q = search.toLowerCase();
      r = r.filter(c => [c.make, c.model, c.regNo, c.city, c.bank, c.state].some(v => v?.toLowerCase().includes(q)));
    }
    if (filters.banks.length)     r = r.filter(c => filters.banks.includes(c.bank));
    if (filters.zones.length)     r = r.filter(c => filters.zones.includes(c.zone));
    if (filters.states.length)    r = r.filter(c => filters.states.includes(c.state));
    if (filters.cities.length)    r = r.filter(c => filters.cities.includes(c.city));
    if (filters.makes.length)     r = r.filter(c => filters.makes.includes(c.make));
    if (filters.models.length)    r = r.filter(c => filters.models.includes(c.model));
    if (filters.fuelTypes.length) r = r.filter(c => filters.fuelTypes.includes(c.fuelType));
    if (filters.statuses.length)  r = r.filter(c => filters.statuses.includes(c.status));
    if (featured)                 r = r.filter(c => c.featured);
    if (filters.budget) {
      const [min, max] = filters.budget.split("-").map(Number);
      r = r.filter(c => c.highestBid >= min && c.highestBid <= max);
    }
    const sorted = [...r];
    if (sort === "price_asc")  sorted.sort((a,b) => a.highestBid - b.highestBid);
    if (sort === "price_desc") sorted.sort((a,b) => b.highestBid - a.highestBid);
    if (sort === "year")       sorted.sort((a,b) => b.regYear - a.regYear);
    if (sort === "popular")    sorted.sort((a,b) => b.contactCount - a.contactCount);
    return sorted;
  }, [cars, search, filters, sort, featured]);

  const activeFilters = Object.values(filters).filter(v => Array.isArray(v) ? v.length > 0 : !!v).length + (featured ? 1 : 0);

  return (
    <div className={`min-h-screen transition-colors duration-300 ${dark ? "bg-slate-950" : "bg-slate-50"}`}>
      {/* Demo banner */}
      {CONFIG.DEMO_MODE && (
        <div className="fixed inset-x-0 top-0 z-50 bg-blue-600 text-white text-center py-2 text-xs font-semibold px-4">
          🔧 Demo Mode — Replace <code className="bg-white/20 px-1 rounded">APPS_SCRIPT_URL</code> in CONFIG to go live with Google Sheets data
        </div>
      )}

      <Header dark={dark} toggleDark={() => setDark(d => !d)} view={view} setView={setView} carsCount={cars.length}/>

      {view === "home" && (
        <>
          <Hero dark={dark} searchTerm={search} setSearchTerm={setSearch} carsCount={cars.length}/>

          <div className="max-w-7xl mx-auto px-4 sm:px-6 pb-12" style={{ paddingTop:"1.5rem" }}>
            <FilterPanel dark={dark} master={master} filters={filters} setFilters={setFilters}/>

            {/* Toolbar */}
            <div className="flex flex-wrap items-center justify-between gap-3 mb-5">
              <p className={`text-sm font-medium ${dark ? "text-slate-400" : "text-slate-500"}`}>
                {loading ? "Loading inventory…" : (
                  <><span className={`font-bold ${dark ? "text-white" : "text-slate-900"}`}>{filtered.length}</span> cars found{activeFilters > 0 && ` (of ${cars.length})`}</>
                )}
              </p>
              <div className="flex flex-wrap items-center gap-2">
                <button onClick={() => setFeatured(f => !f)}
                  className={`flex items-center gap-1.5 px-3 py-1.5 rounded-xl text-xs font-bold border transition-all
                    ${featured ? "bg-amber-500 border-amber-500 text-white" : dark ? "bg-slate-800 border-slate-700 text-slate-300" : "bg-white border-slate-200 text-slate-700 hover:border-slate-300"}`}>
                  <Star size={11} fill={featured ? "white" : "none"}/> Featured
                </button>
                <select value={sort} onChange={e => setSort(e.target.value)}
                  className={`px-3 py-1.5 rounded-xl text-xs font-semibold border outline-none transition-all
                    ${dark ? "bg-slate-800 border-slate-700 text-slate-300" : "bg-white border-slate-200 text-slate-700"}`}>
                  <option value="newest">Newest First</option>
                  <option value="price_asc">Price: Low → High</option>
                  <option value="price_desc">Price: High → Low</option>
                  <option value="year">Year: Newest</option>
                  <option value="popular">Most Enquired</option>
                </select>
                <button onClick={() => { setLoading(true); setTimeout(() => { setCars([...SAMPLE_CARS]); setLoading(false); }, 700); }}
                  title="Refresh"
                  className={`p-1.5 rounded-xl border transition-colors ${dark ? "bg-slate-800 border-slate-700 text-slate-400 hover:text-white" : "bg-white border-slate-200 text-slate-500 hover:text-slate-900"}`}>
                  <RefreshCw size={13}/>
                </button>
              </div>
            </div>

            <CarGrid cars={filtered} dark={dark} loading={loading}
                     onContact={setContactCar} onDealer={setDealerCar}
                     savedCars={savedCars} toggleSave={toggleSave}/>
          </div>
          <Footer dark={dark}/>
        </>
      )}

      {view === "dashboard" && (
        <DealerDashboard dark={dark} savedCars={savedCars} cars={cars}/>
      )}

      {/* Modals */}
      {contactCar && <ContactModal car={contactCar} dark={dark} onClose={() => setContactCar(null)} onSubmit={handleContactSubmit}/>}
      {dealerCar  && <DealerModal  car={dealerCar}  dark={dark} onClose={() => setDealerCar(null)}  onSubmit={handleDealerSubmit}/>}

      {/* Toast system */}
      <Toast toasts={toasts} remove={removeToast}/>

      {/* WhatsApp floating button */}
      <a href={`https://wa.me/${CONFIG.WHATSAPP_NUMBER}?text=Hi! I'm interested in a repo car from Suraksha Repo Cars`}
         target="_blank" rel="noopener noreferrer"
         className="fixed bottom-6 right-6 z-40 w-14 h-14 bg-green-500 hover:bg-green-600 text-white rounded-full flex items-center justify-center shadow-xl hover:shadow-2xl transition-all hover:scale-110"
         title="Chat on WhatsApp">
        <MessageCircle size={24}/>
      </a>
    </div>
  );
}

document.getElementById('loader').style.display='none';
ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
